body:
  text: 毛詩名物解卷十宋蔡卞集解釋獸麕兕豺獺熊豹羊牛貉豜貆麕崔豹古今注曰鹿有角而不能觸麞有牙而不能噬麞麕也齊人謂麕為麞麞如小鹿而美故從麞也章美也易曰隂雖有美含之以從王事古之制字如此麞從章從音其義一也語曰四足之美有麃麃即麞也或曰麞性善驚故從章吳越春秋曰章者慞偟也蓋麕鹿皆善駭而麕尤怯飲水見影輒奔道書曰麞鹿白膽善驚為是故也詩曰野有死麕白茅包之云考工記曰山以麞水以龍言畫水必以龍畫山必以麞也麞山物也蓋麞性喜山麋性喜澤鹿性喜林故林屬於山為麓而其字從鹿麓者鹿之所在故也鹿林獸也麋澤獸也博物志曰麋掘澤草而食其場成泥名曰麋暖民隨此暖種稻不耕而穫其收百倍麕性羣聚故從囷囷聚也語曰市無赤米而囷鹿空虛先儒以為圓曰囷方曰鹿蓋鹿亦羣聚故囷或謂之鹿也兕釋獸曰兕似牛重千斤一角青色其皮堅厚可以制鎧故水剸蛟龍陸斷犀兕蓋取諸此吉日曰發彼小豝殪此大兕言能中微而制大也老子曰兕無所投其角兕善抵觸先王制罰爵以兕角為之蓋酒陽也發人之剛其過則在抵觸故先王制此以為酒戒詩曰兕觥其觩旨酒思柔此之謂也四升曰角角觸也與此同意豺釋獸曰豺狗足豺似狗而長尾白頰髙前廣後其色黃季秋取獸四面陳之以祀其先世謂之豺祭獸故先王候之以田禮記所謂豺祭獸然後田獵是也詩曰取彼讒人投畀豺虎豺虎不食投畀有北有北不受投畀有昊蓋豺虎以殺為性則冝無所不食有北北方寒凉不毛之地今曰豺虎不食有北不受且付昊天制其罪則惡之至也記曰好賢如緇衣惡惡如巷伯為是故也漢律捕虎一購錢三千豺一購錢百豺虎皆害物之尤者也故詩併言之俗云豺羣噬虎言其健猛且衆可以窘虎也又曰瘦如豺豺柴也豺體細瘦故謂之豺舊說豺獺祭天又或以謂皆自祭其先云疑此二物祭帝而其先與之焉禮曰萬物本乎天人本乎祖故曰人而不祭豺獺也獺獺獸西方白虎之屬似狐而小青黑色膚如伏翼水居食魚孟子所謂為淵驅魚者獺也亦自祭其先記曰獺祭魚然後漁人入澤梁是也蓋獺取鯉於水裔四靣陳之進而勿食世謂之祭魚其字從賴與豺從才同意援神契曰蝟多賴故不使超揚賴才也舊說蟾肪合玉獺膽分巵又曰熊食鹽而死獺飲酒而斃此類之不推也淮南子曰鵲巢知風之所自獺穴知水之髙下言歲多風則鵲作巢卑水之所及則獺移穴其預知有如此矣或曰獺一歲二祭豺祭方獺祭圓言豺獺之祭皆四面陳之而獺圓布豺方布又曰獺祭魚數七缺七蓋不祭也傳曰獺髓滅瘢說者以謂獺嗜魚腦其髓故能滅瘢熊熊似豕山居冬蟄其膽春在首夏在腹秋在左足冬在右足說文能獸堅中故賢能而強壯稱能傑也熊羆亦堅中故熊從能羆從熊也熊好舉木而引氣謂之熊經莊子所謂熊經鳥伸是也冬蟄不食飢則自舐其掌故其美在掌孟子曰熊掌亦我所欲也周官射則共熊侯豹侯蓋諸侯服猛下王德一等故其射共熊豹侯而已又曰田役則設熊席熊席則以蒞衆尚毅故也亦以其溫吕子曰君居則狐裘坐則熊席云云鬼谷子曰分威法伏熊說者以為熊之擊搏先伏而後動豹豹花如錢黑而小於虎文易曰君子豹變小人革靣言能革小人之面而已召南之事是也古今注曰豹尾車周製也所以象君子豹變尾言謙也晉人刺其在位不惜其民而其詩一章言羔裘豹袪至自我人究究言大夫體柔以剛文之而已今其用暴如此則非所以稱其服也居居以言其不通究究以言其不恕豹袪下大夫也詩曰羔裘豹飾又言國君體柔而文之以剛其義上逹也玉藻曰狐裘豹褒𤣥衣以裼之羔裘豹飾緇衣以裼之則豹飾明非褒矣毛詩傳曰飾謂緣以豹皮則緣領蓋人君之服管子曰上大夫豹飾列大夫豹幨此齊一時之數非古也俗云虎豹之駒未成文初皆翠密及長蛻毛然後疏煥蓋亦養而成之傳曰文豹隱霧七日不食欲以澤其毛衣皆成文采殆謂是也語曰豹死留皮人死留名故君子疾沒世而名不稱焉廣志曰狐死首丘豹死首山言不忘本也豹一名程列子曰程生馬古詩曰餓狼食不足飢豹食有餘言狼貪而豹廉有所程度而食其字從勺當為是也羊羊性善羣故於文羊為羣犬為獨也蓋羊每成羣則一雄為主舉羣聽之今俗所謂壓羣者是也北人謂之羊頭詩曰爾羊來思其角濈濈羊前其剛以觸者也故以其角聚為善又曰爾羊來斯矜矜兢兢不騫不崩麾之以肱畢來既升矜矜言羊之愛牧人也兢兢言羊之畏牧人也牧之道擾之以順其性故能使物愛攴之以制其放故能使物畏或降于阿或飲于池或寢或訛所謂擾之以順其性也麾之以肱畢來既升所謂攴之以制其放也傳曰騫虧也崩羣疾也蓋羊之為物以瘦為病而又死善耗敗故不騫不崩本羊言之也禮云羽鳥曰降四足曰漬漬者謂死相瀐漬而善耗敗也六畜之死皆善耗敗而羊為甚故詩如此徐鉉曰羊主給膳以瘦為病故羸字從羊亦豕善肥羊善瘦故羸從羊也詩曰不騫為是故也易曰兊為羊羊性前止故也蓋羊性前逆牛性前順故傳以為使堯牽一羊舜荷箠而隨之不能前矣又曰今使烏獲藉蕃從後曳牛之尾絶而不從者逆也若指之桑條以貫其鼻則五尺童子牽而周四海矣詩曰羊牛下來先羊而後牛者羊性畏露晚出而早歸當先於牛故也內饔曰羊泠毛而毳羶犬赤股而躁臊蓋言羊泠毛而毳則羶犬赤股而躁則臊矣皆物之不可食者故於文臊從燥省羶從氊省也鄭氏以為泠毛而毳毳謂毛别聚氊不解者是也管子曰山髙而不陀則祈羊至矣淵深而不涸則沉玉極矣或言羊或言玉相備也牛孔子曰牛羊之字以形舉也牛象角頭三尾之形牛土畜馬火畜也土緩而和火性健決躁速故易坤為牛乾為馬且乾陽物也馬故蹄圓坤隂物也牛故蹄折陽病則隂勝故馬疾則卧隂病則陽勝故牛疾則立馬陽物也故起先前足卧先後足牛隂物也故起先後足卧先前足而世之學者以謂坤牛取順乾馬取健蓋知其一而已詩曰爾牛來思其耳濕濕以言潤澤也蓋牛之為物安則耳濕病則燥冷故古之視牛者以耳祭義所謂大夫袒而毛牛尚耳是也抱朴子曰鴈銜蘆而扞網牛結陳以卻虎蓋牛善觸虎環其首外觸虎雖猛巧不能制也傳曰禘郊之牛角繭栗宗廟之牛角握社稷之牛角尺詩曰殺時犉牡有救其角救長貌社稷之牛角尺故曰有救其角也禮云牛曰一元大武六牲之號牛曰一元大武號最為美者牛大牲故也周官曰牛夜鳴則庮說文云庮久屋朽木牛夜鳴則庮臭如朽木也蓋牛膏曰香故其臭朽則不可食矣封人曰凡祭祀飾其牛牲即莊子所謂衣之以文繡者也貉貉之性不與物闕不為物宗故為居服為賤者之裘詩曰一之日于貉取彼狐狸為公子裘言于則有見於􅉨非必得之辭言取則得之矣其時則可以為貉其志則在于取狐狸而已緩於賤而要於貴豜豜牡白麇絶有力豜者力足以發物而搆獻之故也字從开七月詩云言私其豵獻豜于公絶有力猶能獲之以獻況力弱者乎豵小而豜大大者公之小者私之豳民豈食取而無厭哉貆貆貉之小善止者也雖小而善止者易獲蓋待獸獵而後得之故伐檀曰不獸不獵胡瞻爾庭有懸貆兮毛詩名物解卷十
