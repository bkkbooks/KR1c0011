body:
  text: 毛詩名物解卷一宋蔡卞集解釋天月星電斗漢月說文曰太陰之精象形古文作内象蟾桂之形故夕從月半見而林罕以爲象其未有蟾桂之狀也釋名曰月闕也言滿則復缺也朔月初之名也朔蘇也月死後蘇生也晦月盡之名晦死也死爲灰月光盡似之也禮曰大明生於東月生於西蓋朔而月出西序夕見莫也故王者早見曰朝暮見曰夕義取諸此所謂朝夕放於日月者也至望然後出於東方夕見尚書大傳以爲晦而月見西方謂之朏朔而月見東方謂之朒蓋言異也詩曰東方之日兮彼姝者子在我室兮在我室兮履我即兮東方之月兮彼姝者子在我闥兮在我闥兮履我發兮履禮也而日月之盛皆在東方故詩舉以刺襄而言男女滛奔不能以禮化也蓋君無失道如東方之日以禮即我故彼姝者子在我室兮也臣無失道如東方之月以禮發我故彼姝者子在我闥兮也詩曰如日之升如月之恒恒上弦也字或作絙蓋冝以絙爲正升言有隆而無降恒言有盈而無虧也書曰哉生明又曰哉生魄說者以謂朔後月明生而魄死望後月明死而魄生故書以朏望生明生魄紀月甲子紀日也楊子曰未望則載魄於西既望則終魄於東其遡於日乎此言士之或貴或賤或肆或拘其在上與之如何而已風俗通曰吳牛望月而喘言使之苦於日矣是故見月而喘蓋傷禽驚於虛疲牛望而喘物之憚怯見似而驚有如此者屈子曰懲於羮者吹韲此之謂也舊說積陽之氣生火火氣之精爲日積隂之氣生水水氣之精爲月故陽燧取火於日方諸取水於月易曰離爲日坎爲月其以此乎星三五厯曰星者元氣之精蓋積氣之中有光耀者也星精也月魄也雲魂也釋名曰祭雨曰升祭星曰布升取其氣之升也布取其象之布也書曰卿士惟月庶人惟星言卿士之證月是也庶人之證星是也月之好惡從星而已故月之從星則以風雨詩曰月離于畢俾霶𩃱矣此之謂也蓋役久病於外則天下幸亂卿士下比於民莫肯念難適能使難滋大而已故是詩取譬如此詩曰嘒彼小星三五在東衆無知者三心五噣四時更見日月夫婦之象也則三星以況姪娣而小星當賤妾矣蓋諸侯一娶九女姪娣與嬪而八故詩正以三五況之三心以春見於東方最先見者五噣以冬見於東方最後見者賤妾之進御於君也猶之小星随此三五先後更見於天不見陵掩則以夫人之惠下故也然進御之法姪娣兩兩當夕故詩又以參昴況之參昴二星也而又皆西方之星其在於東則以夕並見而小星随焉夫月也大星也小星也各以其分夜見於天則夫人惠及賤妾豈特人事而已哉堯典春曰日中星鳥夏曰日永星火秋曰宵中星虛冬曰日短星昴或言星鳥或言星火或言星虚或言星昴相備也蓋聖人南面視四星之中言星鳥則以見四星之形也言星火則以見四星之次也先儒以爲四方七宿各成一形東方成龍西方成虎前成鳥形後成龜形所謂在天成象在地成形是也傳曰龜與蛇交謂之𤣥武則𤣥武七星室壁具龜蛇之形不得獨成龜形而已以今垂象考之虛危前以象蛇室壁象龜梓慎所謂宋鄭其飢乎今蛇乘龍是也蛇蓋虚危之星考工記曰龍旂丸斿以象大火也鳥旟七斿以象鶉火也熊旗六斿以象伐也龜蛇四斿以象營室也四斿變言龜蛇亦以𤣥朔道之所在龜蛇相成異乎三方不可謂之龜旐故也爾雅曰氐天根也國語曰天根見而水涸本見而草木節解駟見而隕霜火見而清風戒寒天根亢也本氐也駟房也火心也爾雅曰營室謂之定傳曰營室之中土功其始說以爲定昏見而中然後可以營建宫室故亦謂之營室詩曰定之方中作于楚宫揆之以日作于楚室是也傳曰度日出入以知東西南視定北準極以正南北謂之營室又非定取其時而已禮運曰日星以爲紀故事可列也蓋以爲龍見而雩水昏見而栽若此之類所謂日星爲紀者也電隂陽激耀與雷同氣發而爲光者也雷從回電從申隂陽以回薄而成雷以申洩而成電故也或曰雷出天氣電出地氣故電從坤者管子所謂天冬雷地冬霆是也記曰地載神氣神氣風霆風霆流形言萬物以風霆流形而風霆出於地中神氣也說卦曰離爲雷電火屬也蓋隂陽暴格分争激射有火生焉其光爲電其聲爲雷今鐵石相擊則星火燒石損井則雷又況天地大爐之所薄動真火之所激射乎易曰雷電噬嗑又曰雷電皆至豐雷電噬嗑言雷電合而章也按月令雷乃發聲後五日始電而今旱暵亦或電而不雷則電雷不必皆合而章也故易雷電合而章然後爲噬嗑然雷電合而章又不必皆至若今震雷與電俱起者所謂雷電皆至者也故君子折獄致刑以象天之至威非特明罰勅法而已詩燁燁震電不寧不令言變亂於上不安故常且非所以號令萬物也董子曰太平之時雷不驚人號令啓蟄而已矣電不眩目宣示光輝而已矣斗北斗七星輔一星一至四爲魁五至七爲杓所以運量萬物莊子所謂維斗得之終古不忒者也斗有環域太𤣥曰斗一南而萬物盈斗一北而萬物虛言物豐於纁夏耗於𤣥冬随斗轉徙而已鶡冠子曰斗運於上事立於下斗指一方四寒俱威此之謂也易曰豐其蔀日中見斗又曰豐其沛日中見沬沬蓋星之激者蒒之輔星理或然也孔子曰豐其蔀位不當也日中見斗幽不明也然則日中見斗尚非所宜日中見沬尤非所宜也蓋三應上非所宜應而應焉非所宜應而應焉此昏所以更出於四也詩曰曽孫維主酒醴維濡酌以大斗以祈黄耉罍取象於雷斗取象於斗燕禮曰王燕則宰夫爲獻主臣莫敢與君亢禮今此曽孫維主更以大斗酬之則以尊事黄耉非禮之正也非禮之正則亦所以爲厚也郊特牲曰郊之祭也大報天而主日主日則明王者不敢主天與膳夫燕主同義漢萬物之精上列爲星河精上爲天漢詩倬彼雲漢昭回于天言水氣之在天爲雲水象之在天爲漢今皆倬然昭明回摶於上則非雨之候也又曰瞻卬昊天有嘒其星言旱乆繁星備見則尤非雨之候也且其正言昊天則夏之時也以今觀之炎夏旱暵而熱則小星森而如碁蓋星陽之精也陽盛而充則星稠於上其理然也詩曰維天有漢監亦有光言有光而無明也蓋況幽王無監察之實矣又曰跂彼織女終日七襄雖則七襄不成報章睆彼牽牛不以服箱東有啓明西有長庚織女則以況其内牽牛則以況其外跂彼織女不成報章言有織之名與象而已無成女事衣被之實也睆彼牽牛不以服箱言有牽之名與象而已無成男事轉輸之實也啓明則以況其左長庚則以況其右言王左右或當養人以啓道王徳或當養人以庚續王事今皆有名位而已無其實也又曰有捄天畢者所以助載鼎實則天漢言幽王哲不足以照察天畢言幽王惠不足以化養亦皆有名位而已無其實也星皆在天而天漢天畢獨言天則以況王故也又曰維南有箕不可以簸揚維北有斗不可以挹酒漿維南有箕載翕其舌維北有斗西柄之揭斗南斗也聖人南面視四星之中以箕在南則斗在北矣箕則以況其前斗則以況其後不可以簸揚言有箕之名而已於養人無簸揚之實也不可以挹酒漿言有斗之名而已於養人無挹注之實也箕之用在舌言翕則其形反矣斗之用在心言揭則其形覆矣此又言箕斗之將落而其象變也蓋二十八宿者經星舎於天而不動者也至於向晨則天牽之而西没故北斗言西柄之揭是詩於織女言不成報章則非不以也不成而已矣牽牛言不以服箱則非不可也不以而已矣於織女言跂猶有織之象也於牽牛言睆猶有牽之象也至於箕斗不可以簸揚不可以挹酒漿其舌則言翕其柄則言揭以眀幽王内外左右前後之臣其惡皆有加而無已也天亦有光猶有光也載施其行則言天畢虛設於其位而已矣夫幽王之君臣皆有名位無照察化養衣被轉輸啓道庚續簸揚挹注育人之實此東國之所以困於役而傷於財也故其卒篇所陳如此夏小正曰漢案戸正南北也毛詩名物解卷一
