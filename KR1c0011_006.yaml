body:
  text: 毛詩名物解卷六宋蔡卞集解釋鳥雎鳩鳴鳩黃鳥鳲鳩鴻鷺桑扈鶚鴟梟隼鶺鴒鳯凰鵙梟鴟燕雎鳩雎鳩或謂之鶚或謂之王雎凡鳩皆陽鳥也剛而能制者真若乎陽故鳩訓聚而有别者也和而不同則有是意故謂之雎鳩然有不可犯之道也故又謂之鶚王大也於鳲鳩則為大矣故又謂之王雎勒以法度足以一衆者莫如雎鳩故雎鳩氏為司馬夫有可歸之德又有可歸之位者后妃也故關雎又為王者之風而不為諸侯之風能聚所以喻后妃之求淑女能别所以喻后妃不失禮義也鳴鳩鳴鳩或謂之鵲鳩或謂之鶻雕凡名鳥者必有所善鳴鳩善鳴者也春者啓之時秋者閉之時啓則有時閉則無事鳴鳩以啓來而閉去故鶻鳩氏為司事臣以骨鯁為任而非倡和者故命官以鶻鳩而不謂之鳴鳩也詩曰宛彼鳴鳩翰飛戾天非修翼之鳥而至乎其逺則敗矣黃鳥黃鳥之為物中和而得時者也有中美之性故謂之黃鳥其鳴以春為期其去以秋為度倉庚所以鳴其時也故凡記時者皆言倉庚形色皆有中和之美黃鳥所以命其德也故哀三良刺宣王皆言黃鳥仲夏黍登而聲伏故謂之摶黍鳲鳩鳲鳩能定志而有所守者也有所守則可以為善可以為羣故謂之鵠雛夫王者民人之主也無均平之德則不足以治之故鳲鳩氏為司空止則在桑飛則在梅徙則在棘下則在榛無往而不擇也夫人無均一之德則不足以為諸侯之家鵲之性剛而不可奪守而不可欺鳲鳩無為巢之功而有居守聚利之善此其所以得而有之也是故作詩者以喻乎諸侯之夫人及其在位之臣自大夫妻至庶人皆不得而擬焉蓋能一者治人非治於人者也鴻鴻之為物髙可以致逺卑可以濟難知時而去就者也鴈不専逹而所至必從其長故大夫執鴈亦有從長之意鴈制於長成於屬有長必有屬故以鴻譬天子之使新臺云鴻則離之以長言之者詩多以山喻君而此以鴻蓋新臺之刺宣公家道也於國則言其位於家則言其長雖魚潛於卑幽鴻飛於髙逺魚網設而鴻離之豈設網之意哉鷺鷺潔白而不汚立常有振舉之意足常跂有振而獨舂之貌步好自低昂而謂之獨舂也作詩者以其潔白而不可汚喻君子之德以常有振舉之意喻君子之威儀夫威儀欲其棣棣而以振舉何也蓋不可以髙仰之驕色也不可以卑俯之俯替也是驕近亂替近疾其升也不驕其降也不替此所謂威儀棣棣不可選也然則振鷺之威儀豈所謂髙仰者哉桑扈桑扈竊脂也性好集桑故因以桑則九扈之名也戶所以閉邑所以守故謂之扈羽領之間皆有文而又善自閉守故名為扈而作詩者所以喻君子之禮文少昊氏以九扈為九農正亦曰扈民無淫者也梟梟無爪牙羽翼之才而以口向物物所惡而已亦以物惡故常集於幽荒蒙蔽之土也墓門有棘有梟萃止是已泮水曰翩彼飛梟集于泮林梟可惡之鳥泮水可欲之地且梟之惡非翩然而集于木者惟僖公有仁厚之德故雖所惡之鳥能集可欲之地不庭之虜猶之梟去幽荒而集于泮林也其來雖不足以為善惟其不害於物故能翩然集之而不為物逐也鴟梟鴟梟性隂伏而好凌物者也隂伏以時發者必有以定之內畜志以凌物者必有以決乎外故謂之鴟梟然其害物也能竊伏而不著鷹隼之勢故鴟梟以喻管蔡之暴亂隼隼之擊物而必中者也必至謂之隼物而􅉨謂之鷹必至者或有所過取故作詩者以隼喻不制之諸侯而司冦之官則以鷞鳩名之鶺鴒鶺鴒者有所就有所招者也彼可即而即之則無不親彼可令而令之則無不從如􅜇鴒之尾應首也親則有雍雍之能和從則有渠渠之能容故謂之雍渠作詩者以喻兄弟之無不親無不和也兄弟之道天性也動其􅜇脅而首尾應者雖有強誠亦自然而已故字或以為鶺鴒鳯凰瑞應者也盛德之所感天命之所受則應時而至矣少昊氏以鳥名官而鳯凰為歷正分至啓閉之官皆有屬焉故詩以喻大臣鳯凰鳴矣于彼髙岡者朝廷也鳴者辟令也蓋國有六職有坐者而論道者焉鵙鵙見於萬物開閣之時夏至而鳴冬至而止天地不勞萬物以生萬物以死夏至則生者勞物冬至則死者定物鵙鳴同萬物而勞者也故謂之百勞鳴於二至之間故伯趙為司至七月以鵙為將續之候觀天時而終人事所以順萬物而作者也梟梟類鴟而尤好陵物者也有陵物之意故當求之端待發氣果敢而發必中聲當曉者以其如此非若強茅之隂伏也鴟鴟猛而不剛勇而無才塞而不通故謂之強茅從大而不能有為故謂之鴟哲婦之主乎內也其為物若梟其隂伏若鴟故曰懿厥哲婦為梟為鴟燕燕就陽而畏隂南北往來有生息之道知天時而不違以自飬至南而勞至北而息勞而生也息所歸也玄鳥西北乙鳥東南自所歸而言故謂之玄鳥自所生而言故謂之乙鳥或就所生而言或就所歸而言何也蓋官之親就天道而司人事歸以息者天道玄者天之成象也故司分為玄鳥氏玄者氣之自然而正也故以天道言之則配以自成天命玄鳥降而生商非人之所為也燕之生育於東北蓋人所見也故謂之乙其來去有自安之道故謂之燕莊薑送歸妾而謂之燕燕于飛雖以為燕而亦有自安之道歟毛詩名物解卷六
