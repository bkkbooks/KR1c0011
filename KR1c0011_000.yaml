body:
  text: 毛詩名物解詩類提要臣等謹按毛詩名物解二十卷宋蔡卞撰卞字元度興化仙㳺人熙寧三年與兄京同舉進士第仕至觀文殿學士事迹具宋史自王安石新義及字説行而宋之士風一變其為名物訓詁之學者僅卞與陸佃二家佃安石客卞安石壻也故佃作埤雅下作此書大㫖皆以字説為宗陳振孫稱卞書議論穿鑿徴引𤨏碎無禆於經義詆之甚力葢佃雖學術本安石而力沮新法齗齗異議君子猶或取之卞則傾邪姦憸犯天下之公惡因其人以及其書羣相排斥亦自取也然其書雖王氏之學而引証𤼵明亦有出於孔頴達陸璣之外者寸有所長不以人廢言也且以邢昺之僉邪而爾雅之疏列之學宫則卞書亦安得竟棄乎書凡十一類曰釋天釋百榖釋草釋木釋鳥釋獸釋蟲釋魚釋馬雜釋雜解陳氏書録解題稱分十類葢傳寫誤脱一字也乾隆三十九年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:82738f09a75c375c3faf156c5bada263411bcc70962d5334f0a6df5c66f7d9d2
