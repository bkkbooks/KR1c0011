body:
  text: 毛詩名物觧卷十三宋蔡卞集觧釋魚鱒鯉魴鼉龜鱒鱒鮅也人能以魴節而必取之也不以法度則不足以得之故必以緩細之數九罭是也鯉鯉易得之魚甘而無毒足以養人者也故字從里衡門先魴而後鯉先其至美者也魚麗言萬物盛多故自其多得言之先之以鱨鯊次之以魴鯉潛言備饗獻之物自其大者言之先之以鱣鮪次之以鰷鱨又次之以鰋鯉大而至於鱣小而至於鯉此潛之所謂多魚也魴魴寡力而易困者也勞則尾赤以寡力之性而人勞矣其易困也尤甚故汝墳喻商餘憔悴之民禮物得其正則美而無思魚隂物魴爲至順故爲味肥甘而衡門有至美之意以不可必得者也以魴之幽隂則喻其居之静以魴之柔順易制而肥甘則喻齊女之美鱨不可多得之魚故字從嘗與直從且同意惟其甘而不可多得之魚且能盛多此魚麗所以首言之也鱨鯊固美矣而不可多得故美不足以言而以多爲貴詩曰㫖且多言其㫖而又多也魴鯉固多矣而隂陽一有暴戾之氣則不美矣故多有不足以言而以美爲貴詩曰多且㫖言其多而又㫖矣鰋鯉故多矣而又美取之爲易食之而甘旨也多也皆不足以言而以時取之爲貴詩曰旨且有蓋不時不足以爲有也春行羔豚夏行腒䐹秋行犢麛冬行鱻羽蓋性至此而後定則食之皆所以順時氣故有得之而致美乎滋味也鼉鼉從黽腹大之形鼓腹大而鳴之而逺聞故謂之鼉鼔鼉善鳴者也龜龜有神靈之性而非盡然者也蓋一有龜而其性不同詩有曰元龜言其大意言大不足以盡之故易有曰元吉有曰大吉而此不曰大也蓋元之爲言始也先也大也人致之以知吉凶之始可先事而得其始也諸侯庭實以爲先列者其先也詩曰我龜旣厭不我告猶其靈通乎人而吉凶可以觀也毛詩名物解卷十三
