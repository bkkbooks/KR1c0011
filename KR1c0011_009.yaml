body:
  text: 毛詩名物解卷九宋蔡卞集解釋獸麟兔鹿麝犀麈虎猱厖狼狐猲驕駮豵麟麟麒麟土畜也信至應禮以足至者也音中鍾吕行中規矩不羣居不旅行不入陷穽不罹羅網王者至仁則出角端有肉示有武而不用不踐生草不食生物有愛吝之道故麟從吝牡麒牝麟隂主吝嗇故有曰吝也詩曰麟之趾之定之角始於趾終於角言德以升進為美也易曰德言盛故是詩每況愈上爾雅曰麟似麕一角故西狩獲麟曰有麕而角也或曰麟肉角鳯肉咮皆示有武而不用也傳云麟似麒而無角案爾雅曰驨如馬一角不角者麒然則麟從麒省不角故也或曰詩序以為皆信厚如麟趾之時從吝以厚故也從其以信故也其信也其者指物之辭兔兔口有缺吐而生子故謂之兔吐也舊説兔者明月之精視月而孕故楚辭曰顧兔在腹言顧兔在月之腹而天下之兔望焉於是感氣禮云兔曰明視亦此意也蓋咀嚼者九竅而胎生獨兔雌雄八竅故陶氏書云兔舐雄毫而孕五月而吐子而里俗又謂視顧兔而感氣故卜秋月之明暗以知兔之多寡也今孔雀亦合蓋先儒以孔雀聞雷而孕則兔雖舐毫而其感孕以月理或然也月缺也故其口缺詩曰肅肅兔罝施于中林蓋椓木之丁丁以有所聞施于中逵以有所見施于中林則無所聞無所見於是焉肅肅則好德之至也故詩以此為德徐幹中論曰肅肅兔罝施于中林處獨之謂且先王之化言格於芻蕘行至於雉兔然後為博故是詩正言兔罝而敘者以為莫不好德也古今注曰兔口有缺尻有九孔今尻於文從九蓋生於兔也內則曰兔去尻狐去首蓋狐亦正丘首不忘本也説文無兔字以免為兔兔生自口而出冝有留難而後免故字又通為免俗作兔非也今免身亦謂之分娩蓋物之産乳莫易於羊莫難於兔故羊子曰逹免子曰嬎逹之為言羊也嬎之為言兔也兔足前卑後倨其形俯又從免也冕字從免古之説冕者以為位彌髙而志彌恭其以此乎內則曰姆教婉娩聽從蓋婉妻道娩母道聼婦道從姑道也鹿字説曰鹿性警防相背而食以備人物之害蓋鹿羣居善走者也分背而食則相呼羣居則環其角外向以備物之害己故詩以況君臣之義而詩草蟲經曰鹿欲食則皆鳴相召志不忌也蓋鹿愛其類發於天性周官曰視朝則服皮辨正以鹿皮為之蓋取諸此詩曰王在靈沼於牣魚躍王在靈囿麀鹿攸伏言人之與物異類則魚見之深入鹿見之決驟今魚樂於沼鹿安於囿如此則以文王之德行於靈沼靈囿而有以及之故也小爾雅曰鳥之所乳謂之巢雞雉所乳謂之窠兔之所息謂之窟鹿之所息謂之場詩曰町疃鹿場言町疃之中無人焉故鹿以為場也麝釋獸云麝父麕足如小鹿有香故文從鹿從射虎豹之文來田麝之香來射則皮與臍為之纍今商汝山中多羣麝所遺糞常就一闕雖逺就食還走其地不敢遺迹他所慮人獲之人反以是從迹其所在必掩羣取之蓋麝絶愛其香每人所迫逐勢且急即自投髙巖舉爪剔出其臍就縶且死猶拱四足保其臍吳筠猿賦以為麝懷香以賈害狙伐巧以招射蓋謂是也陶氏云麝形似鹿今俗謂之香麞常食柏葉故養生論云虱處頭而黑麝食柏而香也又曰啖蛇今以蛇蛻裹之彌香夏月食蛇多至寒香滿入春而臍內極痛即以爪剔出之置尿溺之中皆有常處蓋象退牙犀退角麝退香皆輒藏覆知自珍其貨犀犀性絶躁似豕一管三孔毛大腹卑腳腳有蹄黑色三角一在頂上一在額上一在鼻上在鼻者即食角者也小而不好食棘亦有一角者交州記曰犀有二角鼻上角長額上角短或曰三角者水犀也二角者山犀也在頂謂之頂犀在鼻謂之鼻犀犀有四輩其紋或如爛椹或如狗鼻者上黔一犀無文螺犀文旋牸犀文細牯犀文大而勻舊説犀之通天者惡影常飲濁水重霧厚露不濡其裏白星徹端世云犀望星而入角即此也可以破水駭雞蓋犀之美者有光故雞見影而驚其次角理復有正插倒插正插者角腰已上通倒插者角腰已下通亦以尖花小而根花大者謂之正插根花小而尖花大者謂之倒插故南人以牙為白暗以犀為黑暗亦難别也犀亦絶愛其角墮角埋之王粲遊海賦羣犀代角巨象解齒是也周官函人為甲犀甲七屬兕甲六屬蓋犀革甲差劣於兕七屬增一也或曰翡翠屑金人氣粉犀犀最難搗惟鋸犀成小塊以極薄紙裹置懷中令近肉以人氣蒸之候氣蒸潤乘熱投臼中急搗應手如粉麈麈獸似鹿而大其尾辟塵以置蒨帛中能令歲久紅色不涴又以拂氊不蠧蓋蠅點變白麈尾留紅而狐白貂鼠之類燕見之則毛脫物有相制其異如此今麋鹿醜亦喜紅南人取之則衣赬服而舞麋鹿注視不動因以利刃刺之名苑曰鹿之大者曰麈羣鹿隨之皆視麈尾所轉為凖於文主鹿為麈而古之談者揮焉良為是也恩平郡譜曰沉牛謂之回沙牛謂之磨鹿謂之荒麈謂之擢虎虎奮衝破又能劃地卜食蓋蛇蟠向壬鵲巢面歲燕伏戊巳虎奮衝破此亦鳥獸之所以靈也兵法曰將門牙門常背建向破其以此歟類從曰虎行以爪坼地觀竒偶者曰虎卜云簡兮曰執轡如組有力如虎組以言其藝虎以言其勇常武曰厥進虎臣闞如虓虎蓋虎之自怒虓然闞如虓虎則以言帥之勇發於忠毅非激而怒之也何草不黃曰匪兕匪虎率彼曠野哀我征夫朝夕不暇言兕抵觸虎摶噬先王驅而逺之則率彼曠野兕虎之所宜今征夫如此則可哀矣爾雅曰熊虎醜其子狗絶有力麙漢律曰捕虎一購錢三千其狗半之是也方言曰虎陳魏宋楚之間謂之李公江淮南海之間謂之李耳注云虎食物值耳即止以觸其諱故然則仁人之於親聞名心瞿見似目瞿豈自外至哉吳越春秋曰虎之卑身將有以擊也蓋鳥之擊先髙獸之擊先卑舊説虎威王夜方旦目精豆晝即漸大又云虎死必倚巖壁淮南子曰虎之乳子不能摶噬者殺之為其墮武此君子所以貴夫箕裘也猱猱體柔而善猜者也猜者犬之性而猱善猜故從犬又猜以入人者讒佞也其狗猱焉角弓論幽王之好讒佞則曰無教猱升木如塗塗附厖厖金獸也秋則得氣之正故天子於秋食之金為剛故字從阜故畜之而能擾成豪則剛果而善相慝未成豪則能吠而已能吠而大故謂之厖犬以牙為威者長喙則所制者衆故謂之獫雖喙短亦足以揚而肆其力故謂之猲驕爾狼狼犬類而長者也剛則強而樂取故牝謂之貛柔則剛而自守故牡謂之狼知進而不知退者也貛知剛知柔者今狼也詩曰狼跋其胡載疐其尾言乎不逆而動也夫胡跋則可上而不可退退則觸尾尾疐則可就而不可進進則踢胡能委順以解之身逸而體全矣故疐跋之難而不能害之謂狼讒巧之敗而不能失之之謂聖狐狐性之不果於進者也人疑則衆乖而不附獸疑則羣離而不親故謂之狐疑者好思而難其動也故狐貉之厚以居而為逍遙服南山之詩曰南山崔崔雄狐綏綏疑而不明也何草不黃曰有芃者狐率彼幽草君不明而臣疑其上也猲驕犬短喙曷以為驕也駮駮類馬駮食虎虎食馬凡類已也而能除己害者在所交也豵豕俯而聼有職者如之生一曰特猶之正也生二曰師猶之師也生三曰豵猶之師帥而從之者也毛詩名物解卷九
