body:
  text: 毛詩名物觧卷十七宋蔡卞集觧雜觧草木緫觧美刺緫觧草木緫觧匏可食葉苦不可食葑也菲也不能常美人之所不能常善者也荼苦也有曰如薺有曰如荼皆甚美而爲之辭也菽微而采之有以貟之筐方之筥者㑹諸侯以禮數者也匏葉以爲葅微者也兎首以爲羞薄甚也而禮不以微薄廢者也甘瓠纍樛而上行成美之實也瓞𤓰之小者也而緜緜能大者文王紹太王而興者也𤓰在疆場無曠土者也苹也蒿也芩也鹿之食也而芩不若蒿之大而蒿不若芩之美禮有加也莪蒿之細則難辨者也莪蔚之大則易辨者也蓼莪之思彌深而易辨者猶難辨也采芑之菜也方其始則采於新田以新田爲不足而及於菑畝也世未嘗無士也亦新美其材而㧞取之若菑畝之芑可也有芑之草也物之微也豐水東注言其順物之理乃能立法也故曰皇王維辟也豐水有芑言其順物之理乃能貽謀也故曰以燕翼子也草木有待於霜而成者蒹葭蒼蒼漸至於采采尤待霜而成者也國待禮而後固也葭菼揭揭薍也葭也蓬也始而生則蒐田時也葛也藟也漘滸潤之而後蕃也漘也滸也葛藟纏而後固者也王室艱難不可以相無者也始河之滸中河之涘卒河之漘地之愈危彌不可無葛藟之纏固也葛藟縈於樛木則衆妾附后妃之仁而進此逮下者也葛藟施於條枚而子孫縁先祖之功而起此受祖者也葛寄松栢而生者也蘿縈松柏而生者也蔦蘿同姓也松柏王室也同其存亡者也卒曰松上則引之彌髙者也萇楚材之柔不能自立而可扶掖以成其枝華也人有不能以欲故也予之無家無知無室豈有樂之者疾其人之欲故也芃蘭柔而蔓依以自立者也人不能者以驕故也佩觿雖文而不我知無知人之道也佩韘雖武而不我甲無長人之德者也知人君德也山有扶蘇也喬松也隰有荷華也游龍也上下各得其宜而忽之所美乃非美者也子都容之美也子充德之美也茹蘆色之可染者也以禮則平易故曰東門之墠墠者男子之所以行禮也下言東門之栗栗者女子之所以行禮也棠棣之華桃之華蕣之華凡以喻色也棠棣之華華如桃李華而實者也桃華而實有蕡家室之所以成德也實而蓁蓁家人之所以庇陂之失道也蕣朝華而暮隕非可恃者也此喻物之無助者也凡木曰華草曰榮榮而無實爲英蕣先曰華而後曰英喻無實也木生仁者也林爲君者也積仁以能蔽者也樛木屈而下垂而葛藟得以纍甘瓠得以纍者仁之下屈者也棠棣華所覆者鄂鄂所承者華而韡韡然天性也兄弟相友亦天性也枤杜木大而特生尚有葉以蔽者也而枤杜有以刺獨居而無兄弟者也有以刺不求賢以自輔者有以敘征夫之情而自傷者甘棠勿翦至於勿伐愛之至也然甘棠者教也惟其教之眀是以愛之至若夫化則化有所至而愛有所忘者也梅先衆木而花實者也梅先時則男女不可以不及時者也蔞於楚則微而猶可刈者微者亦成材也樸􅈪於林猶免陵賤者禮所以自防而不可以微賤薄廢者也棘堅而木之難長養者棘心至於棘薪則長養劬勞而後成者也榛所以養也苓所以治也養譬則德也治譬則能也德在乎上故曰山有榛也職在乎下故曰隰有苓也此衞之賢者又多能而苓之不若者也南山有䑓北山有萊則前後皆得賢而其基大者也臺萊徧於山之上下以爲蔽者也此言邦家之基也其葉有儺而幽且沃者桑也其枝下垂而宛以華者楊也以其爲山蔽飾故以此言邦家之光也把之實可以療李之實可以食故以此言民之父母也栲之榦髙大而車以爲輻杻之名檍而古以爲弓其堅以大也故於此言遐不黄耉也枸則生而茂以堅楰則久而益不朽爲其可傳於後世故於此言保艾爾後此其得賢之效也凡山之髙隰之下莫不有材以爲賁也山之樞隰之榆不皆美材亦足以庇覆而子之裳衣弗曵弗婁車馬弗馳弗驅何也山之栲即樗而其葉茂隰之杻即檍而其材堅猶以爲榮觀而子之庭内弗洒弗埽鐘皷弗鼓弗考何也山之漆可以爲器隰之栗可以爲禮而子之酒食不鼓瑟而喜樂以永日何也車鄰則美有車馬禮樂侍御之好故曰阪有漆隰有栗漆可以用栗可以食而阪隰之頼以爲飾者不若桑楊之美也故卒曰阪有桑隰有楊條所謂稻梅所謂柟也條梅尤終南之文飾者也若夫錦衣狐裘顔如渥丹則雖文以服飾以容而冝實以君之德也故曰其君也哉戒之也卒使之壽考不忘勸之也把棘木之堅剛者也桐椅木之柔令者也君子德欲剛儀欲柔故於把棘言令德桐椅言令儀令儀嫌於無實離也桐椅以譬儀之柔令者也生於朝陽則以見君之下賢不以令之柔而必以德之温厚也松柏葉美材茂本堅而久者也自天保福禄而下之至於竹之苞松之茂又本久而固者也自福德澤而下之至於松柏之茂無不爾或承德蔽廣而久也竹虚而節直而和者也淇澳德也緑竹棫樸附而生者也棫樸之爲薪材微而用大此官人者也榛楛者莖如荆葉如著木之微者也而在旱麓濟濟能盛者以見流澤之遠此受祖者也柞棫木之堅也文王之德至於柞棫矣則柔者可知故昆夷駾矣大邦畏其力虞芮質厥成小邦懐其德也柞棫之枝猶堅以固者矣王公於諸侯待信義而後固者也故采菽信以結之使如柞柔之附於枝義以制之使如紼纚之維其舟也檀木之堅而美者也谷木之㪚而惡者也把不如桑之本固者也桑不如檀之堅强者也將仲子里也牆也園也而戒之以無踰以言無侵我之家事也把也桑也檀也而戒之以無伐以言無害我之兄弟也始於里卒於檀以見養人愈强而愈不可制也柳之條柔而不可折以樊圃也椒之實蕃而遠條盛則本衰者也王之揚之水而不能流束薪至於束楚束蒲之彌輕以見王愈弱不能有爲也鄭之揚之水不能流束蒲至於束楚束薪以見臣愈强而不可令者也不能有爲罪在上故刺其上也不可令罪在下故閔其上也聖人言詩而終於鳥獸草木之名蓋學詩者始乎此而由於此以深求之莫非性命之理道德之意也美刺總觧美與嘉者至善之謂美至美之謂嘉美不足以盡其善而後有嘉召伯之甘棠武公之緇衣善之至也成王假樂美之至也閔之與刺者有所不忍謂之閔欲其知之謂之刺蓋閔之者惜其如此而後形之於惻隱之心而刺之者譏其如此如鍼之刺物欲其知也溱洧刺亂而爲亂者作也出其東門閔遭亂者作也雖知刺尚喜其知而閔則惜其去也而不可復何以知其如此白駒刺宣王之不用賢黍稷閔周之顚覆是以知其如此也至於箴疑於規誨疑於誘而戒近於勸蓋箴者以其有所不可爲不可爲而爲此其所以箴之使不爲也庭燎之詩始則美之終則箴之者何也美之者以其有可爲箴之者以其有不可爲也勉於視朝勤於從民此之謂可爲視朝之失時從政之失事此之謂不可爲知視朝從政而不知視朝從政之禮原其始不可以無美要其終不可以不箴也箴之不從而後規之規者正圎之器也有亂之道而使之不亂此所以爲規沔水是也規之而不從又從而誨之者毎事而言以教之也故鶴鳴于九臯聲聞于野此教之修德也魚潛在淵或在于渚此教之治民也它山之石可以爲錯此教之用賢也誨之不從而後刺之以見善之日退不善之日進惟其善之日退不善之日進此聖人序詩所以次其輕重之次也然而戒者以其有可戒之道勸者以其有可勸之理戒其所可戒卒乎無戒公劉召康公之戒成王也公劉者世之甚微成王者世之甚盈舉其甚微而著其甚盈此公劉之所以作也終南之戒襄公以其有土地之廣車服之盛而恐其德之不足以稱故詩曰終南何有有條有梅欲其德之宜於服也故戒其所可戒成王卒至於治平而襄公終不失其德故曰卒乎無戒見其所可爲而勸之以善殷其雷勸以義也見其所可爲而後勸之以義式微勸之以歸也見其可歸然後勸之以歸故曰見其所可爲而勸之以善此戒之異乎勸也至於誘者謂其心有是端而以言引而進之此之謂誘衡門誘僖公也至於思則近於念憂則幾於懼哀則同於傷蓋思望於其心而已念者又思之至也下泉之思治丘中有麻之思賢匪風之思周道遵大路之思君子是皆想望於心而願見之者也渭陽康公之念母有見其思之至也陟岵孝子之思念父母蓋始乎思卒乎念至誠之心有加而無已也斯其以爲孝歟憂者懼之至懼者恐之至慮之深然後至於恐何以知之防有鵲巢之憂讒而詩曰一日不見如三月兮此懼之所以深於憂也哀者主於人傷者主於已主於人者措之於無可奈何之域而直其志而已主於已者感於内而形之於外而且嗟其如此也故日月緑衣終風謂皆莊姜傷已之詩也蕩則周室大壞蕩然無復紀綱文章故異矣周室之顛覆閔之而已壞未至於顛覆故猶有感傷之心若夫黄鳥之哀三良則矜亡而已所謂闗雎哀而不傷者蓋桀紂之已亡而不傷感於心也至於東門之疾亂鴟鴞之救亂野有死麕之惡無禮蝃蝀之止奔擊鼓之怨州吁旄丘之責衞伯小明之悔仕亂世柏舟之言仁人不遇均亂一言疾一言救何也無禮則止而滛奔亦可惡州吁之用兵何以不責衞伯之不修職何以不怨仁人不遇則曰言仕於亂世則曰誨古人豈徒言哉亦各有所主而已蓋亂之在下則可以救不可以疾亂之在上則可以疾不可以救故管蔡之亂所謂在下者也徒疾之而已則傷於仁此鴟鴞之所以救也幽公滛荒之亂所謂在上者也孰能救之哉此東門之枌所以疾也惡者化之在乎上止者化之在乎下在亂世而文王之化爲已行而下之人皆知無禮之可惡此野有死麕不言止而言惡也民未知滛奔之恥而衞文公以道化其民而使之不齒則其所以化之者在乎上而不存乎下也此蝃蝀所以不言惡而言止也怨之者猶有景慕之心而責之者遏其不能行所當行蓋詩人愛之重所以怨之深待之厚所以責之重至夫事在可怨之域而吾且不怨者是以無知也猶有不怨而責之猶有不責者雖州吁之暴猶有景慕之心此國人所以怨也修方伯連帥之職衞伯之所當行也此旄丘所以責之也悔者追其事而已言直言其過之所遇仕於亂世者旣徃之咎也此小明所以悔也若君不受已之志特言之而不刺然後可以謂之仁此柏舟所以言仁人也與毛詩名物觧卷十七
