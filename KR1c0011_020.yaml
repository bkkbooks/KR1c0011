body:
  text: 毛詩名物解卷二十宋蔡卞集解雜解廟制詩序統解廟制臣等謹案周禮夏后氏世室堂修二七廣四修一五室三四步四三尺殷人重屋堂修七尋崇三尺四阿重屋周人明堂東西九筵南北七筵堂崇一筵五室凡室二筵鄭氏謂世室宗廟也重屋王宫正室若大寢也或舉宗廟或舉王寢或舉明堂互言之明其同制周書亦曰太廟路寢明堂咸有四阿重亢重廊復格藻梲設移旅楹內階𤣥陛提堂山牆臺門𤣥閫則三者同制明矣故明堂位曰太廟天子明堂而月令仲夏天子居明堂太廟先儒謂明堂制與太廟同亦曰太廟也然則天子太廟五室土室居中大於四室故謂之太室書曰王入太室裸是也其左為東房其右為西房皆南其户而木室在東北火室在東南金室在西南水室在西北木室東户火室南户金室西户水室北户詩曰築室百堵西南其户傳曰或西其户或南其户而家語又曰賜觀太廟之堂未既還曕北闕皆斷西户謂金室北户謂水室也四室中央太室亦曰夾室劉熙釋名曰房旁也在堂兩旁也夾室在堂兩頭故曰夾室夾室皆在前室謂之廂爾雅所謂室有東西廂曰廟無東西廂有室曰寢而覲禮云凡侯於東廂是也說者謂天子宗廟無廂夾不已誤乎其四中則南曰明堂北曰𤣥堂東曰青陽西曰總章太廟冬居𤣥室太廟孟月皆居左個季月皆居右個是也至於閏月則闔門左扉立於其中而退適路寢居門中月令鄭氏謂於文王在門謂之閏則太廟象先王平生所居與明堂路寢同制五室十有二座理宜然也或曰太廟與路寢明堂同制則上有五室不得有房又惑矣案書路寢實有東房西房東夾西夾而明堂位曰太廟天子明堂則魯用天子禮樂太廟如明堂制而季夏六月以禘禮祀周公於太廟君衮冕立於阼階夫人副褘立於房中則太廟路寢明堂有房明矣今先所圗上廟制欲以入廟約少牢大夫宗廟為之雖增四阿重檐山節藻梲堂九尺階九等略應王禮而無五室無階又以房為北堂且謂房無北壁故得北堂之名夫堂與房異著矣安有為房而無北壁者哉其制既非而又無臺門𤣥閫內階𤣥陛山牆賁鏞之飾纍棟復格設移四門逺嚮黑楹丹桷藻井之制至於饎㸑又在廟中西堂下此復續儀禮之誤也說者謂饎而在西堂下逼西壁謂之天㸑置於廟中理不安矣况欲逼宗廟西壁為之乎說者或謂西壁謂西牆也案儀禮有曰西牆有曰西壁則壁與牆異矣臣等考之特牲饋食曰主人服如初立於門外東房南面視側殺主婦視饎㸑於西堂下蓋堂謂門側之室爾雅曰門側之室謂之孰近人曰門堂三之一古者㸑在廟門外或在東或在西故饎㸑在廟門下之西堂下少牢饋食曰雍㸑在門東南北上廪㸑在雍㸑之北特牲饋食云牲㸑在廟門外東南魚臘㸑在其南皆西面饎㸑在其西北壁士虞禮曰側亨於廟門外之右東面魚臘㸑亞之北上饎㸑在東壁西面由是觀之饎㸑在廟門外之西堂下逼西壁為之明矣故曰饎㸑在西壁又曰主婦視饎㸑於西堂下臣等稽考載籍廟與路寢明堂同制雖具其凡如右然其修廣之度行人以為南北七筵東西九筵凡室二筵謂之凡室二筵則太室大矣太廟五室十有二堂太室又大則廣九筵修七筵不能容之案市朝一夫而鄭謂方各百步則東西九筵南北七筵亦謂南北各六十三尺東西各八十一尺歟且古者寢不踰廟宴衣不踰祭服而宣王考室之所曰如跂斯翼如矢斯棘如鳥斯革如翬斯飛則先王之宫室甚輪奐矣又曰噲噲其正噦噦其冥噲噲大聲也噦噦小聲言其閎可以響答豈與大夫之陋同日而語又况後世彌文積隆以至於今也然則天子廟雖古制殘缺不可知而今亦有不可盡如古者要之度先王稽當世與時宜之其前代載籍所不得見與其後世未之有者法可以道揆禮可以義起使華副實以稱昭明垂之百世取成於心實在聖躬如允臣等所議伏乞參校舊圗擇其善者以聖訓裁之詩序統解靜而為性動而為情定而為心適而為志晦而為道顯而為言妙而為神粗而為法此之謂體用之言此之謂生出之序情不能無動則有所感志不能無適則有所言言麗乎顯則有所寓法陳乎粗則有所形此詩所由作也凡順之則喜逆之則怒得之則樂失之則悲忿有所不已則不能無怨欲有所不獲則不能無思事有所不當則不能無嗟理有所不足則其氣不能無歎此詩之所謂情也窮之則鬱逹之則舒或屈或伸或拘或肆或逺或近或小或大義之所起則不能以辭害之辭之所止得以意逆之命之所止則況之而以其言要其所歸則導焉而以其趨此詩之所謂志也貴極於王公大人之所作賤極於羈臣小夫之所為抑揚天下之至情包羅萬物之至理曲而有所謂端聚而有所謂升譎而有所謂正微而有所謂彰在所可言也故雖侈而不疑於誇在所略也則雖約而不疑為簡此詩之所謂言也不止於美而有所謂嘉不止於規而有所謂誨雖亂而在所可矜也則閔之而不以傷雖過而在所可恕也則哀之而不刺方其致嚴也雖天子亦貶之於風方其致美也雖諸侯而進之於頌此詩之所謂法也故昔之能詩者正其六義之歸辨其四始之叙取其辭義之合於禮義者著於篇使學而循之者可以言體而行之者可以治修身接物事父事君論其粹則可以美教化移風俗論其妙則可以動天地感鬼神故古之作樂者則取是以文之也古之燕飲者則取是以賦之也可以導和可以見志蒸而為佳氣止而為中聲雅正之音歌頌之美洋溢乎上下疏導乎隂陽則詩之所施豈曰小補之哉作詩者不知起於何代然自生民之能言則詩之道已具矣康成以為詩不起於上皇之世豈其然乎作序者不知自於何人然非深通乎法言莫之能為也或以謂子夏衛宏之所為則疑其不能及也孟子曰王者之迹熄而詩亡詩亡然後春秋作然則所謂詩亡者非詩亡也禮義之澤熄焉而已矣變風變雅之作而知止乎禮義當是時詩尚存也惟其禮義之澤熄然後詩之道亡矣何也蓋詩者禮義之所止故也詩亡則美刺之法廢春秋作則褒貶之法興使詩之道尚存則愚知春秋不作矣蓋美刺之法廢而無褒貶以繼其後則亂臣賊子無所忌憚而接迹於後世矣古之君子號為善救天下者知此道而已矣雖然能詩者豈曰言治人之間而已哉亦知其所致而已矣不然孔子之進子貢何以言告諸往而知來者毛詩名物解卷二十
