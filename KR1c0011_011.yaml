body:
  text: 毛詩名物解卷十一宋蔡卞集解釋蟲蟻蠅蠨蛸蠋蜂螽斯騰蛇蛇虺蚺蛇蝍蛆蟻莊子曰道在螻蟻蟻有君臣之義故其字從義繁露曰人者仁也我者義也故其義字亦從我記曰蛾子時述之其字從我是也書曰王麻冕黼裳卿士邦君麻冕蟻裳明王於此斷恩而蟻裳又言申君臣之義也詩曰鸛鳴于垤垤蟻冢也蓋蟻將雨則出而壅穴鸛見之長鳴而喜易林所謂蟻封穴户大雨將集是也一名蟻封傳曰蟻封盤馬孟子曰泰山之於丘垤趙岐曰垤蟻封也莊子曰於蟻棄智於魚得計於羊棄意言慕人之與使人慕之皆不可為也故至人之計在於物我兼忘其藏也不厭深眇而已矣又曰得時則蟻行失時則鵲起蟻行逶遲有序需而不速君子得時其廉於進如此夏小正曰𤣥駒駒者蟻也方言曰梁益之間謂之𤣥駒莊子曰鰲之冠山蟻之戴粒其於逍遙一也此即南華鵬鷃之義言小大雖殊而理各至足豈容勝負於其間哉蠅蠅好交其前足有絞繩之象故蠅之字從繩省凖生於隼繩生於蠅其義一也亦好交其後足搖翅自扇故爾雅曰蠅醜扇也假氏曰蒼蠅聲雄壯青蠅聲清聒聲皆在翼又曰青蠅尤能敗物蓋青蠅善亂色蒼蠅善亂聲故詩以青蠅刺讒而東方未明曰匪雞則鳴蒼蠅之聲也一章言耳聞疑而起也二章曰月出之光言目見似而起也青蠅首赤如火背若負金蒼蠅又其大者肌色正蒼今俗謂之麻蠅傳曰以氷致蠅蓋蠅逐臭者喜暖而惡寒故遇氷輒側翅逺引所謂夏蟲不可以語氷者也類從曰蠅生於灰蓋蠅墮水溺死以置灰中須臾即活淮南子以為爛灰生蠅正謂此也蠨蛸釋蟲云蠨蛸長踦蕭梢長踦之貌故名郭璞曰今小蜘蟵長股者俗呼喜子亦如蜘蟵布網垂絲著人衣裳有親客至荆州河內之人謂之喜母陸子曰乾鵲噪而行人至蜘蟵集而百事喜蓋謂是也詩曰蠨蛸在户蠋蠋蟲如指似蠶一名厄詩曰鞗革金厄金取其堅厄取其完也又謂蜎蜎者蠋蒸在桑野言蠋以絲自裹又久在桑野雖蠋而已然其自營也完矣詩以此托況而敘曰一章曰其完也韓非子曰蟺似蛇蠶似蠋人見蛇則驚駭見蠋則毛起婦人拾蠶而漁者握蟺故人利之所在皆為賁育莊子曰奔蜂不能化藿蠋以言材之有大小管子曰夫龍欲小則化如蠶蠋此言龍化如蠋而已然抱朴子以為有蛇蠋化成之龍意者天下有自然之龍有蛇蠋化成之龍乎故曰或生而知之或學而知之及其成功一也蜂蜂有兩衙應潮其主之所在衆蜂為之旋繞如衛誅罰徴令絶嚴有君臣之義化書曰蜂有君臣其毒在尾垂尾如鋒故字從鋒省傳曰蜂蠆垂芒此之謂也詩曰莫豫荓蜂自求辛螫荓蜂使人為辛螫之譬也言蜂善辛螫藏精育毒雖小不可不愼爾雅曰蜂醜螸螸垂腴也一名蠆其字象形蓋蜂類衆多動以萬計故借為萬億之萬舊說數人以千數物以萬莊子曰號物之數謂之萬抱朴子曰雞有專棲之雄雉有擅澤之矯蟻有兼弱之智蜂有攻寡之計援理觀之人之強弱相制衆寡相攻何以異此是故齊與魏鬪而莊周以為戰於蝸角也螽斯螽斯蟲之不妬忌一母百子故詩以為子孫衆多之況鵲巢言夫人德如鳲鳩能均養七子而已是詩乃稱后妃之子孫衆多如此者蓋太姒則百斯男者文王之所以聖也文王之所以聖者天道也召南則人道而已何足以與此螽斯一名舂黍或謂之舂箕草木疏曰蝗類青色長角長股股鳴者也或曰似蝗而小黑股有文五月中以兩股相切作聲聞數十步者是也詩曰五月斯螽動股言螽斯股成而奮迅之也爾雅曰螽醜奮蓋於是時股成而奮迅之方春尚弱也故列子曰吾力堪秋蟬之翼折春螽之股蔡雍月令曰其類乳於土中深埋其卵江東謂虴蛨又謂蚱蜢善害田稚公羊傳曰􅏑何以書記災也􅈮何以書記異也字蓋從冬冬終也至冬而終故謂螽也騰蛇騰蛇龍類也雄鳴於上風雌鳴於下風而風化能興雲霧而游其中慎子曰騰蛇游霧飛龍乘雲是也荀子曰騰蛇無足而飛梧鼠五技而窮言梧鼠之技雖多不如騰蛇之結於一也故窮墨子曰靈龜近灼神蛇近暴傳曰靈蛇棄鱗神龍解角以言至人達士超世拔俗委蛻萬物蛇魚屬連行詩曰委蛇蓋取諸此傳曰退食自公委蛇委蛇謂從者也衡而委蛇必折故序言正直洪範三德一曰正直中德也其行委蛇以其德在剛柔之中太史公曰大直若屈道固委蛇有是哉此之謂也舊說蛇盤向壬壬北方也周官曰龜蛇為旐先儒以為龜蛇象其扞難避害蓋龜甲者也而蛇擊前則尾應擊後則首應自腰擊之則首尾俱應有兵之象故龜蛇合體謂之𤣥武易曰一隂一陽之謂道而𤣥朔者道之所在隂陽之理具焉舊說牛以鼻聼蛇以目聽語曰蛇聾虎齆其以此乎虺虺狀似蛇而小語曰為虺弗摧為蛇奈何以此故也正曰之詩曰哀今之人胡為虺蜴虺一名蝮博三寸首大如擘舊說蝮蛇毒在首螫手則手斷螫足則足斷蛇之尤為毒烈者也一曰蝮與虺異虺如土色所在有之蝮蛇鼻反其上有斜錦文衆蛇之中此獨胎産生輒拆裂母腹字從蝮其以此乎亦有與蛇同色者蚺蛇蚺蛇尾圓無鱗身有斑文如故暗錦纈難死似鼉行地常俯其首膽隨日轉上旬近頭中旬近心下旬近尾南人云俗取其膽入藥即以線合其瘡縱之後遇捕者輒自見金瘡以明無膽亦其智也蝍蛆爾雅曰蒺藜蝍蛆廣雅曰蝍蛆蜈蚣性能制蛇卒見大蛇使緣而啖其腦莊子曰蝍蛆甘帶是也今俗謂之百足魯連曰百足之蟲斷而不蹶則其所恃者衆也一名蚿方言曰馬蚿北燕謂之蛆蟝其大者謂之馬陸一名商距莊子使蚊負山商距馳河毛詩名物解卷十一
