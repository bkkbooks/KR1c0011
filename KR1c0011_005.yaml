body:
  text: 毛詩名物解卷五宋蔡卞集解釋木桃桐木瓜李樗缺蔦榛柳杜唐棣栲柞棘椐栵檿柘柳條楊椅樞榆檀缺桃桃先百果而華故從兆其時則春而陽中也故以記婚姻之時正桐桐木之良利者也其性虛以柔故能受聲以為琴瑟則其木以堅實為上以虛柔為下故椅也桐也梓也皆強良以為器而非桐梓也木瓜木瓜弓材之下者也木瓜之詩曰投我以木瓜言其實大於桃而已是故三章皆言所投者木瓜報者以玉何也蓋木果所以助養人之物而玉者人君之至貴者也投我以助養人之木果而報之以至貴之玉此序所謂厚報者也維民報之心若是其厚此桓公之霸所以半古之人而功必倍之也歟夫木仁也以譬君子之德玉陽也以象君子之性桓公之惠小而功德微矣故報止以玉為足以取類矣如天保報上則無物比焉亦欲其夀考而已李李以純白之華如桃李紅白相間也桃李之成實其時偕也投我以桃報之以李言施報之道也李實之為用微矣周之賢人闕所以種藝之道故雖磽確之丘中有麻之可衣有李之可食貴衣絲賤衣麻榖實重果實輕言賤者有以為衣則貴者可知矣言輕者可以為修則重者可知矣蔦蔦之施于柏猶異姓之親托於王也女蘿之施于松猶同姓之親托於王也故頍辨之詩曰蔦與女蘿施于松柏女蘿非出於柏蔦非出於松蔦與女蘿而尚或施諸松柏諸公有幽王之親而無以托焉安能有松柏之德哉榛榛小木也所以為禮實則貴矣植之榛栗椅桐梓漆先禮實而後工器也然亦伐之以為藩則賤者人之所忽而不治瞻彼旱麓榛楛濟濟雖人所不治之材然猶潤澤蕃息之盛者非有隂陽和調自然之正氣而無所暴利則萌孽莫之遂逹而有所夭折雖然二詩所以不同何也蓋衛國有狄人之敗露居處於曹無城市宫室君臣上下冠婚喪祭無以為禮實則於是不可不先周至太王傳世已久德澤之加乎民非特若不治之榛楛能濟濟然盛也故舉其微小者則強大者可知矣舉其人力不治者則勤治者可知矣二者之意不同各有所當也柳柳柔木也蕃所以禦寇柔不足以濟難故曰折柳樊圃狂夫瞿瞿以柳為樊而生之不足以為固故折柳者柔之至也猶之兔為饔餼體微不足以為厚而斯首則微之至也小辨之詩曰菀彼柳斯鳴蜩嘒嘒夫蜩鳴於菀然之柳至衆之民而不能使其有所附焉此小辨之所由怨也杜杜赤棠也而多特生故詩有枤杜者昭公之枤杜言其葉生湑幹生枝枝生葉枝譬則兄弟葉譬則族也昭公不能強本以兼族獨居而無兄弟曽枤杜之不如也武公之枤杜言生于道左弼居君之右輔居君之左道譬則君左譬則輔武公有兼宗族之強而無求賢自輔之德曽枤杜之不若也文王之杕杜言有睆其實其葉萋萋睆者實大而可見萋者葉齊而已成其實可見其葉已成則木之氣定而止息之時而已征夫勞于王事而不知息曽枤杜之不若也唐棣唐棣栘也其葉相向而開相反而合或向或反文繡之巧麗也故言王姬車服之盛則曰何彼穠矣唐棣之華穠厚貌夫文繡之巧麗而謂之厚何也曰得禮之正則為厚失禮之正則為薄栲栲輻材也南山有栲言其堅久也故曰樂只君子遐不眉夀栲從考與蓍從耆同意柞柞之性堅強而不為霜露之遷得土之正氣也故詩以喻信性堅剛難長柞棫之木猶且拔然以大矣則柔者可知矣棘棘赤心而外束也詩曰凱風自南吹彼棘心賢則親之無能則憐之者母之親子也棘非能順者而凱風有母之道便能吹之使其心夭夭然和以茂也園有桃之詩曰園有棘其實之食食者正養人之物而以為實食所謂儉而嗇也鳲鳩之詩鳲鳩在桑其子在梅言鳲鳩之所生者専一而不二故其子在梅在棘在榛而終不失其所也蓋棘在外故鳲鳩之正是四國青蠅之交亂四國四國以赤心而捍外者也榛在內故鳲鳩言正是國人而青蠅言搆我二人讒言之害正也疏則難搆親則易入讒及所親之人則甚此二詩所以皆言於卒章也椐春秋傳曰弱足者居椐適可杖居者之所材也椐又匱也材適可杖木之貴也栵檿柘柳栵栭栗也叢謂之灌細謂之栭二者非可以為大用故有害於營家室則修之平之柳河桞也椐之材可以為杖而已去之不為傷地利存之不為利生物故啓之辟之則無害於為室家者猶或存而不去也檿山桑也其幹弓車之材也檿柘為不去矣或猶攘之剔之此有以見周之興天下之民居之曽居室之不容矣條條柚也其實與梅同皆可以同味故終南之詩戒襄公則曰終南何有有條有梅二者嘉卉也南山之冝有嘉卉以為蔽猶人君宜受顯服以為章也楊夫先王之於百物為人用則貴之易稱百榖草木麗乎土得土之灌以厚者其質剛得土之虛而薄者其性柔楊濕生故材為下松檜之木至剛而不為四時風雨之所遷也檜堅實而理直則冝以為楫松剛直而不變則宜以為舟楊非堅實之材故菁菁者莪之卒章言泛泛楊舟載沈載浮僅可以載任而已采菽言君子之信義足正諸侯故曰泛泛楊舟紼纚維之言紼纚維之則固制下之道也東門之楊其葉牂牂牂從羊言美而未大也東門之楊其葉肺肺肺為金臟言其已成所以刺昏姻之失時也椅椅梓實桐皮非梓之正非正而外若同焉有椅之意樲若棗而小非棗之正棗甘而樲酸棗屬而樲二者也羊棗謂之遵則不二者也樞樞為之區受戶壯焉天自為區又有受也闔闢因之矣荎謂之樞有俞有制知闔闢矣榆榆瀋滑故謂之榆荎榆而有刺所以為主枌榆而已安可長也以俞為合乃卒乎分夫根如羒榆如枌皆分之道毛詩名物解卷五
