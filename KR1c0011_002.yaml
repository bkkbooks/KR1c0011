body:
  text: 毛詩名物解卷二宋蔡卞集解釋天虹霧露霜冰虹雄曰虹雌曰霓舊說虹常䨇見鮮盛者雄少暗者雌者也一曰赤白色謂之虹青白色謂之霓故虹字從紅省而說文解霓以爲屈虹青赤色或白色隂氣也今俗謂虹虹蜂也一名蝃蝀爾雅曰蝃蝀謂之雩螮蝀雩也蜺爲挈貳貳蓋言二淮南子曰天二氣則成虹是也虹滛氣也故又借爲實虹小子之虹虹潰也詩言蝃蝀在東莫之敢指說者以謂婦道過禮則虹氣盛應之莫之敢指文子曰至治之世虹蜺不見則夫婦過禮虹氣爲盛理或然也蓋氣還矣天氣不復於是盛虹盛虹天之濕氣也夫水氣之在天爲虹而久天之滛氣耳尚且惡之如此而況於人乎所以痛此奔也故曰蝃蝀止奔傳曰里名勝母曽子不入邑號朝歌墨子回車有是哉其上章曰朝隮于西崇朝其雨言朝氣之外自西則非雨雲矣雖幸而雨亦莫能久也崇朝其雨言其雨崇朝而已爾雅曰暴雨謂之涷蓋言西雲而東雨則莫之能久也造化權輿曰其風自西而東者爲雨蓋風至自東則雲從之矣說曰東雲西雨又云東雲謂之上雲西雲謂之下雲上雲蓋雨之雲也故易曰宻雲不雨尚往也又曰密雲不雨已上也以今考之虹在東常隔雨而朝之外於自西則鮮或雨矣雖雨亦莫能久也故詩以此戒人之奔外雲言朝則以況滛奔之始螮蝀言晚則以況其終終則言不復雨矣虹霓之象也先儒以爲雲漏日日照雨滴則虹蜺生今以水歕日自側視之則暈爲虹蜺雖則虹生於地之氣不暈於日不成也故今雨氣成虹朝陽射之則在西夕陽射之則在東月令季春日虹始見蔡邕以爲虹常依隂雨而晝見於日衝無雲不見太隂亦不見常以日西見東方故曰蝃蝀在東蝀之文從東以此故也蜺則常依䝉濁見於日旁白而直者曰虹凡見日旁者四時常有之惟雄虹起于是日至孟冬乃藏霧爾雅曰天氣下地不應曰雺地氣發天不應曰霧莊子以爲騰水上溢爲霧蓋火氣之在地成烟水氣之在天成霧霧雲之類也雲事也霧務也蓋天不應矣而地出以有所務故霧謂之晦此聖人所以不從事於務也今霧四起善是故月可以逺望而不可以細書霧可以細書而不可以逺望日中而雲霧四塞則時多隐士其以此歟志林曰黄帝與蚩尤作大霧一軍昬惑黄帝乃法斗機作指南車以别四方蓋雲霧有可以術致者古之方士或作五里霧或作三里霧而列子以爲冬起雷夏造氷殆謂是也楊子曰霧縠之組麗女工之蠧矣言縠纎麗如霧而爲女工之蠧也釋名曰縠粟也其形足足而踧踧視之如粟也又謂之紗縠亦取踧踧如紗也然則取其如粟故謂之縠縠從榖省以此故也傳曰善人遊如行霧中雖不濡濕潛自有潤又曰飛塵増山霧露増海是故君子貴遷善也露造化權輿曰中央之氣露露形如珠故古者冕旒如之董子曰冕旒下垂如綴繁露或謂之繁露也束晢集曰零露垂林非綴冕之飾義取諸此冠天象也故弁飾望之如星而冕旒如綴繁露老子曰天地相合以降甘露人莫之令而自均蓋露雖雨類而露無逺近之偏故詩以譬德澤詩曰蓼彼蕭斯零露濃濃而叙者以爲蓼蕭廢則恩澤乖矣是也詩曰野有蔓草零露溥兮言天之下露髙矣而今延及蔓草則以下流故也又曰湛湛露斯在彼豐草豐草者露之所豐又非特延及而已豐草同姓卑之況也式㣲之詩一章曰微君之故胡爲乎中露二章曰微君之躬胡爲乎泥中露言有沾濡之辱泥言有䧟溺之難也一曰泥中中露皆邑以今考之衛在大山之間雨露所鍾以此名邑理或然也而劉向列女傳又以爲此詩人所作一作於中露一在泥中理或然也然則後世柏梁之體倣於此乎鶡冠子曰昔之得道以立至今不可遷者四時泰山是也其得道以危至今不可安者岑巒煙溪籜木降風是也其得道以生至今不可亡者日月星是也其得道以亡至今不可存者零葉遇霜朝露遭日是也由是觀之夫何適而無有道邪故禹不得聖人之道不立跖不得聖人之道不行霜雨露以生而霜以肅殺相之故霜之文從相釋名曰喪也其氣慘毒物皆喪也霜遺之義出於此今霜隕而易脆膠漆不堅草木脫落糞本然則古者霜降而婦功成百工於是休息豈特人事而已哉亦自然之理也詩曰正月繁霜我心憂傷陽正也隂慝也以人正言之則一月謂之正月以天言之則四月謂之正月盛徳在火繁露而言繁霜無是也則民之訛言亦大矣故君子爲之憂傷也或曰古者一夫嗟咨匹婦抗憤而六月爲之飛霜則正陽之月霜以乖致蓋有之矣劉向所謂霜降不節不以其時其詩曰正月繁霜我心憂傷此之謂也蓋幽王之時天變見於上地變動於下始於霜降失節山之卑者湧而爲岡䧟而爲陵及其甚也日月薄蝕雷電變常水泉沸騰山谷易處故詩曰朔日辛卯日又蝕之亦孔之醜􅏎􅏎震電不寧不令百川沸騰山冢崒崩髙岸爲谷深谷爲陵董子所謂國家將有失道之咎先出災害以譴告之不知自省又出怪異以警懼之尚不知變傷敗廼至則若此之類是也今露之繁在夏而至秋則成霜霜之繁在冬而至春則成露故傳以爲露隂液也釋而爲露結而爲霜冰說文曰仌凍也象水凝之形今仌面所凝文蓋如此釋名曰凌氷室也其文望之似仌凌之理也字或爲冰易曰乾爲氷乾西北之卦也故爲氷乾爲氷則坤爲霜可知矣坤西南也禮曰天地嚴凝之氣始於西南盛於西北易曰履霜堅氷至氷者隂剛之盛也蓋坤之初六下也上無陽以正之而坤爲順故自初履霜馴致其道至堅氷也莊子曰冠圎冠者知天時履方履者知地形冠天象也履地象也詩曰如臨深淵如履薄氷臨淵恐墜也履氷恐䧟也周官凌人掌氷正嵗十有二月令斬氷三其凌凌之積水也三其凌其二所以備消釋也應劭風俗通曰積氷曰凌凌氷曰凍氷流曰澌氷解曰泮莊子曰是所謂氷解凍釋者也言至人不凝滯於物如此蓋藏曰凍故冰言解凍言釋爾雅曰氷脂也脂之爲物得隂則凝得陽則釋盖氷之類也故形謂之脂傳曰鏤氷畫脂義取諸此一曰氷即尚書古文凝字說文亦云水堅也從仌從水魚陵切俗氷從凝蓋膏凝曰脂故曰氷脂也義取凝結而孫炎所言爾雅舊本亦依凝雖改古字亦非氷凝之氷也詩曰二之日鑿氷沖沖沖沖鑿氷之意也鑿氷所以備暑蓋詩上章備寒故於是乃言備暑毛詩名物解卷二
