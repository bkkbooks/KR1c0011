body:
  text: 毛詩名物解卷十六宋蔡卞集解雜解天命帝命解天說舞小星北門解佩玉解天命帝命解詩言天言帝言天命言帝命何也無為而在上一而大者天有為以應下動而諦者帝也言天則尊而與人道辨言帝則近而與人道交帝之於天如聖之於神名其功用於天地之間故曰帝也易自震言之曰帝蓋帝也者萬物之主也自物而言之則帝出乎萬物者也自人而言之則帝親乎人者也故詩凡言天命靡常天難諶斯天作之合天立厥配三后在天對越在天克配彼天以其藏于不可知之間而遠者也凡言帝命不時帝度其心帝謂文王帝省其山帝遷明德帝作邦作對者以其顯於所可見之際而近者也詩言天命𤣥鳥則出於理之不可知故言天也古帝命武湯則眀其德於所可見故言帝也此對而言之也合而言之則天者帝之體帝者天之用酌言皇天親有德享有道民之父母民之攸歸親有德也德有形故言親民之攸暨享有道也道無形故言享蓋天聰眀自我民聰眀而民所受則天所親也民所仰則天所享也皇天言其道蒼天言其色昊天言其象旻天言其情上天言其位天說北曰上天者精微之天也故詩言無聲無臭則稱上天文王之詩是也南曰昊天者廣大之天也故詩言無極無盡則稱昊天雨無正之詩是也爾雅曰春曰蒼天夏曰昊天秋曰旻天冬曰上天東木敷則天遠而蒼西金斂則天近而閔故蒼天言其遠則旻天者邇矣夏南交則天降而下冬朔易則天升而上故上天言其髙則昊天者下矣天之所以為天縱則有髙下橫則有遠近者因時而已矣夏曰昊天則春於昊天為大秋以昊為少可知矣蓋東帝言太昊西帝言少昊其天亦如之春於是大故東方亦曰昊歐氏以為春曰昊天夏曰蒼天是也秋於昊為少故西方亦曰昊天淮南子曰西方曰昊天東方曰蒼天是也秋曰昊天則春發生夏樂育可知矣夏假也故其天為昊秋愁也故其天為旻至冬則終而無事在上臨下而已故曰上天也上天𤣥天蓋牡北方之所在故其天𤣥其帝紫𤣥正黑色而含赤紫間色也赤而含黑故南方之赤入北而為𤣥所謂三入為纁五入為𤣥也北方之黑出南而為紫所謂火尅金為紅水尅金為紫是也火上生而為𤣥𤣥陽也故天北𤣥而為始水下尅而為紫紫隂也故帝北紫為極列子曰清都紫微鈞天廣樂帝之所居而傳云紫微太微之座太乙常居是也紫微言其色太乙言其數在紫為微則色之至也在太為乙則數之至也淮南子曰中央曰鈞天東方曰蒼天東北曰變天北方曰𤣥天西北曰幽天西方曰昊天西南曰朱天南方曰炎天東南曰陽天亦所以名見之也蓋東北曰變天則土化火革水因其所為天可知矣西北曰幽天則東陽西昧南明其所為天可知矣火曰炎天則木曰溫天可知矣東南曰陽天則西北曰隂天可知矣言𤣥天則纁可知矣言朱天則白可知矣舞先王之制舞文以羽籥武以干戚蓋羽容也籥聲也聲名以昭之文物以紀之者文也故於文舞用之干以捍其內戚以誅其外者武也故於武舞用之此大舞也干與戚並陳羽與籥兼用若夫小舞則干而已無戚也而樂師所謂教國子以小舞而有曰干舞也羽而已無籥也而樂師所謂教國子以小舞而有曰羽舞也文舞所以有羽而無籥武舞所以有干而無戚者何也曰象文德之小者以為儀而已故止於羽焉象武功之小者以為捍而已故止於干焉蓋干武舞之小者而大舞謂之萬羽文舞之小者而大舞謂之籥萬者衆之至也籥者和之至也易曰以此毒天下而民從之則仁不足以善羣義不足以得衆非先王所以成文武之道也以武為毒天下則知文為和天下籥聲也萬數也聲陽也數隂也文德以陽言武德以隂言故先王制名法之小星北門解凡莫之為而為者天也莫之致而致者命也北門之忠臣不得其志者天也故曰天實為之謂之何哉小星之賤妾而知貴賤者命也故曰實命不同實命不猶君子之義合則從不合則去至於窶貧而尚從事獨勞而無怨謫摧於內而無憾言此樂天者也三五者數也參昴者名也貴賤之分名數而已名數之出者天此知命者也蓋所以為賢歟若通萬物而無所闕以不識不知而順帝之則者此至於命者也珮玉解上有一瑀下有二璜瑀以竒天道也璜以偶地道也上有二珩珩者行也下有一琚琚者居也瑀又謂之衡衡之以為平也珩又謂之衝衝之行猶衡人行亦行也毛詩名物解卷十六
