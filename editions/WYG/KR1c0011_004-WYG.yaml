body:
  text: 毛詩名物解卷四宋蔡卞集解釋草荇蔞菅菼瓠葑菲苓唐諼蒲蓷藚蓍鷊臺緑菫蓄蓼蒹葭茹藘蕨蘩蘿莪荇荇菜謂之茆芥順陽而長本係隂而固有清潔不可陷溺之徳故以況淑女以薦神明泮水曰思樂泮水薄采其茆蓋僖公有教養之善而有所教者其卒有髙明光大之徳也一章言薄采其芹行足以事人也三章言薄采其茆徳足以事鬼神也徳足以事鬼神然後可以燕飲食錫難老屈羣醜矣蔞蔞野草之賤者所以喻漢上遊女孤直而異於衆木故雖生於中田原野之間與薪相錯而翹翹可辨矣賢不肖之相别亦何以異於此哉文王之道被於周南則雖漢上之游女無曲從之志而特可以禮求也菅菅物之柔忍者也其理白其形柔故謂之茅制而用之故謂之菅茅自然之潔白故以之共祭祀菅漚畜而柔忍故以之爲索綯祭祀明徳之事大徳足以事鬼神者妻道也索綯賤用之物小惠足以尸鄙事者妾道也幽王黜申后而立襃姒下國化之以妾為妻以孽代宗而白華之詩作而刺之曰白華菅兮白茅束兮白華漚而為菅則菅者闕使然之致用而爲綯則卑且勞矣故以譬孽妾茅自然之正體藉地以祭則靜且安矣故以譬宗嫡不以賤妨貴不以貴廢賤者人道也不以茅棄菅不以菅害茅者天道也詩曰英英白雲露彼菅茅露者天之所以成物菅之之賤茅之貴二者皆有以成況易其位哉菼菼萑也萑之始生者也萑薍也萑之成體者也蒹蒹也萑之未秀者也菼小於萑萑小於蒹菼青而後潔故曰毳衣如菼白露降然後􅍉可以爲用故也七月言八月􅍉葦未用也故聲從完瓠瓠甘而可食附物而生者也以其可食而非養人之大者況在下之賢人無所附則實不成詩曰南有樛木甘瓠纍之樛木所以接下者非使然也故以況至誠之君子甘瓠之所以纍上者亦自然也故以況在下之賢人君子之接下賢人之附上豈有意於彼我之分所能爲之哉葑菲葑蘆服也苖及下體皆可食而無棄葑者封也卦之於土而後盛者也菲芴也蔌必食苖而葑也菲也以下體爲美故以采葑采菲無以下體菲薄也物之體薄而可食者也苓苓大苦也所以和百藥之性使之相爲用者也故苓從令簡兮曰山有榛隰有苓榛非冝山而不冝隰苓非冝隰而不冝山故榛有植於樊棘之内苓或采於首陽之巔榛也苓也其生不擇地而美者也猶之賢者無所進而不自得焉唐唐王女也松枝化而生女蘿之生依乎松故又謂之䝉䝉蔽也蔽於松者也桑中之滛亂期於幽逺而志在乎依所蔽者也故言唐頍弁刺幽王之無親而與諸公興之無附著者也故言女蘿一物而别言之以二者亦此意歟諼諼草蘆也喜則形欲動憂則形欲静動所以致其外樂静所以竭其心思樂則有所向而趨明思則有所背而趨暗伯兮之室家致思者也故其詩曰焉得諼草言樹之背夫載馳之思歸則思渉彼阿丘言采其蝱何以異於此也蓋載馳之思在外故欲行以遣其思伯兮之憂在内故欲止以忘其憂此二詩之興所以不同也蒲蒲香草也有芬芳之實而生乎澤陂之閒彼澤之陂有蒲菡萏是也蓋生於春盛於夏與荷同其榮枯而至於荷之有華菡萏然於是乎婚姻之時則過至此澤陂之士女所以滛奔而不可禁也其本作膳又可以爲蔌韓奕所謂維筍及蒲是也蒲與筍蔌之至賤者也然以其時之所宜獻則不可不備矣公侯燕樂而雖賤者必備則貴可知蓷蓷茺蔚也萑也茂於沃壤當夏中和之時旱則乾水則死有和平之性此詩人所以況夫婦也中谷有蓷之詩一章言暵其乾矣言生之艱難二章言暵其脩矣脩甚於乾況恩衰薄也三章言暵其濕矣濕甚於脩況飢饉則相棄也夫蓷隂草也而附於陽生於中谷之寒水則非遂性之地也其始也乾其中也脩其卒也濕疑有所缺藚蓍鷊臺緑菫蓄蓼已上缺蒹葭蘆謂之葭其小曰􅍉荻謂之蒹其小曰蘿其始生之時又謂之薍蒹能兼地於葭所生能侵有之然不如葭所生之遐不冝下故也􅍉則宜下矣葭能遐假水焉蒹又謂之兼雖兼地然惡下荻强而葭弱荻髙而葭下故謂之荻荻猶逖也蘆秀而蘆蓽可織以爲薄席茨亦可織雖完而用不如蘆而或析也故音完菼中赤始生未黒也而赤故謂之菼其根旁行强揉槃互其行無辨矣而又強焉故又謂之薍薍之始生常以無辨惟其強也乃能爲亂詩言毳衣如菼以其赤黒毳𤣥如之言八月􅍉葦以其可辭以其蠶士言蒹葭刺無以保國以其兼地而遐言葭菼揭揭庶妾上僣以其自下而亂始也騶虞以所生乎下言葭行葦以所生在行言葦且葦小物也茹藘茹草者若亨若葅若生食之尤甚變焉皆度所宜以之而已故又訓度易所謂㧞茅茹者茅始生可茹者也茹藘赤草所染亦赤如此之謂若茈䓞者能已之己其能此乎藘生于心色赤南方也方物相見之染如此安能無慮若茈䓞者何慮之有蕨周秦曰蕨名其始生未有放葉始蕨之時蘩髙青均葉蘩日而繇又潔可以生蠶母糸而草之者也又蘩之醒爲蒿皆髙故也蘿蘿羅生松上如蘿亦羅生而弱又莪謂之蘿科生旁羅也莪莪以科生而俄詩曰匪莪伊蒿伊蔚莪俄而蒿且蔚菁莪育材之詩正言莪者以此毛詩名物解卷四
