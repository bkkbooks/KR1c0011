body:
  text: 毛詩名物觧卷十八宋蔡卞集觧雜觧鳥獸緫觧十五國風次序鳥獸緫觧附昆蟲魚草飛鳥隱顯以得時而不苟於棲食衆羽從之而不可以羣者鳯也音聲顔色之好去就語黙之時能遷而擇所止者黄鳥也潔白髙舉鳴以時而遠聞者鶴也潔白以羣上下有儀飛而有容者鷺也知時以其匹來知所孳乳而去者燕也鳴以警晨而不以晦明而變者雞也摰而和别而通常於水中於中洲者闗雎也彊而别勤於積累以成巢者鵲也鶉微而强者也鳴鳩用心之一而養常均而止於一者也均母道也一婦道也闗雎一宿之鳥難致而難奪者也難致賢者也難任使者也晨風能擊而才鷙者也雉外文明而内耿介守域而别者也鷮雉之微也鳯凰之耦也鴟鳩之大者也倉庚黄鳥之記時也鸒斯飛食必以羣而飛緩以樂者也鶺鴒愛其類行摇必以顧飛急必以鳴者鸒斯其孝天性也鶺鴒飛鳴相顧而欲君之始終自勤者也鴟鴞巧於綢繆其室常繫於危者也桃蟲潛於㣲而拚然大以飛者也鳧鷗飛止僅於水陸氏謂水鳥之愿者也鴞鳥之惡者也鳩微而飛宜下不冝髙者也鵜沾滯得尤不以力者也桑扈竊脂猶終鶯然以文其外者也隼鷙而卑苟不可上則飛以揚者也麟信者也騶虞仁者也麟趾也角也麕微而鹿大者也禮進也豝蕃而豵盛者也豜大而豵微者也鹿懇誠而鳴以相呼者也虎咥而不可暴者也狼䟦跲尾而不失其貪也牛順而强者也羔裘以豹飾則武者也羔裘而豹褎暴者也狐疑而不果者也狐裘服以燕者也狐裘服以朝則不强於政治者也狐裘蒙茸則亂不果於亂難也兎物之狡者也馬臣道也駜馬之用可必者也乘黄色之純者也乘牡色之壯者也乘駽文之錯者也白駒潔其德而未用者也乗馬也乗駒也夫馬異於前而御彌善故兩驂如舞周旋而有節也雁行而有序也如手驂和而一體也維駒也維騏也維駱也維駰也如絲組有文也沃若非特如濡也旣均非特如絲也駉馬之善不在於牧而在於思也思而臧舉而措之於獸無不得其所者矣考牧擾之以順其性麾之以制其放者也知牧人之道也草蟲鳴而阜螽趯趯而從者習而知和隨者也螽斯不妬忌則物之大也不妬無忌則人之聖也蟋蟀微而能鳴以時者也而君有不能及時以樂者也蜉蝣無恃而生而徒飾其羽者也青蠅飛則營止則汚而糝黑白者也蜩微而鳴以時者也莎雞微而羽有聲者也熠燿微而宵有明者也伊威生於室蠨蛸生於户此室家之望女也蜩有情柳無情以有情附於無情而恃以鳴淵無知葦無情以無情寄於無知而恃以生何父之不如也此小弁之怨也螟蛉非蜾蠃類也蜾蠃負之化而類者也人之於人類也非易於感而化之者也猱於木塗附性者也人之於性亦善也則易於感而化之者也魚柔而隱求之以道則得而易制者也其象則賢也民也夫婦也其藏於深眇而求之必以誠者也罩汕不以一方求者也蓋至誠而求者必嘉魚而方其誘之則必魴與鯉也在淵也在渚也就有道者也在藻也在蒲也樂有德者也知烹魚則知治者也知躍則知化者也沼也潛也皆不得其道者也釣有道不取而有得者也緍也綸也竿也所以釣也罛也網也笱也所以求也罭非以求鱒魴者也罛非所施葭菼者也魚網求於下而鴻離之乃得乎上者也𤼵笱𤼵我士者也敝笱無能制者也罶寡婦之笱而微者也而所麗者鱨鯋也魴鱧也鰋鯉也笱微而魚愈大萬物衆多者也止而静者也荇浮於水而根於水則制禮而不制於禮者也蘋浮於水而不根於水藻根於水而不浮於水者也以喻大夫能修法度而已不盡禮之本末者也芹浮於水則出於禮者也藻根於水則法於禮者也茆根於水浮於水不制於禮者也始采芹終采茆泮水序也薇蕨甚㣲而采於南山蕩於取者也始薇之作而至於剛感於時以叙其情者也蕭微物其香可上達者也蓼蕭之零露者下以誠上達上以澤及下者也茅柔潔而理直可藉包者也荑茆之方穉至柔而順潔者也牧君之道也荑夫人之德也草柔而蔓於野則民也露漙於蔓草則澤下流者也露在豐草把棘則晏諸侯者也采葛絺綌微也采蕭祭祀大也采艾療疾急也事大者讒愈至故懼之一日如三月以至三嵗甚也㫖苕美而可食旨鷊綬草也防安鵲巢而不驚卭養旨苕而不害者也君於其宜安養者乃驚之以讒而使憂害之以賊使其懼者也苓也苦也葑也采於首陽未必然者也欲使究其實則以言始聽讒者也曰憂曰懼則被言已信讒者也止於樊止於棘止於榛讒漸入也故卒於構我二人也十五國風次序國風二南所以訓後世也次以衞鄭王所以責王也又次之以齊魏唐所以責二伯也又次之以秦與陳所以見先王之澤未冺也又次之以檜與曹所以見民心之思治也終之以豳所以見王化可得而復也夫國風之正莫如二南國風之變莫如鄭衞二南之美先王所自出也鄭衞之惡誰爲之哉爲天子者不能乂以正之耳故以王夷於鄭衞之間而以鄭衞次於二南之後也齊桓也晉文也假仁義以長諸侯冝以存亡繼絶爲事也魏之見滅於晉也桓不能救文不能復孰謂其能長諸侯也故以魏次於齊唐之間而以齊唐次於鄭衞之後也秦也陳也以爵言之則秦附庸也陳諸侯也以地言之則秦者西夷也陳中國也以世系言之則秦伯翳之後陳乃帝舜之後也然秦得周地之故而其俗美陳以比荆楚之故而其俗亂夫王者旣如彼伯者又如此天下風俗日以謬亂而秦風獨不變於是乎深見先王之澤也故以陳次秦而以秦次於齊唐之後也夫先王之澤也未冺則天下之心其思先王也曷維其已故檜有匪風而曹有下泉之作焉此檜曹所以次於秦陳之後以見天下之心思先王德澤如此則天子諸侯追復文武之基業其理豈甚難哉特不爲之耳故以豳風終焉而豳風者變克正危克扶之詩也毛詩名物觧卷十八
