body:
  text: 毛詩名物解卷七宋蔡卞集解釋鳥雞鵲鸛鵝雉鷂雉鳶缺雞鹽鐵論曰雞亷狼貪故曰小廉如雞爾雅曰雞大者蜀蜀大雞郭璞曰雞大者蜀今蜀雞也蓋雞有蜀魯荆越之種越雞小蜀雞大而魯雞又其大者莊子曰越雞不能伏鵠卵魯雞固能矣成元英曰越雞荆雞也魯雞今之蜀雞案韓子曰魯雞之不期蜀雞之不支則元英所謂非是傳曰雞爲積陽南方之象故陽出雞鳴以類感也案陽氣生於子雞應子而初鳴隂氣生於午雞應午而又鳴則非陽出故鳴也詩曰風雨瀟瀟雞鳴膠膠言雞之信度如此蓋秋氣慘而凄凄風雨如此則疑不能和秋物脫而瀟瀟風雨如此則疑不能固向晦則君子入宴息之時也風雨如此則又疑於己今曰風雨凄凄雞鳴喈喈則亂世之君子不改其度之譬也喈喈言鳴而不失其和膠膠言鳴而不失其固易曰㢲為雞蓋兌見而㢲伏故為雞雞知時而善伏者也乳狗噬虎伏雞摶貍又曰伏雞曰抱王襃曰魚瞰雞睨李善以為魚目不􅉂雞好邪視此言是也禽經曰陸鳥曰棲水鳥曰宿一鳥曰止衆鳥曰集蓋水鳥晚於林棲故曰宿說文云日在西方而鳥栖因以為東西之西詩曰雞栖于塒日之夕矣言雞栖矣日於是夕夕於是月見故也夕象半月未有蟾桂之狀鵲鵲搆巢取在木杪枝不取墮地者皆摶枝受卵故一曰乾鵲而莊子言魚傅沫烏鵲孺蓋鵲以傅而孕育故曰孺也列子曰細腰純雄其名穉蜂與鵲言孺同意淮南子曰太隂所建蟄蟲首穴而處鵲巢向而為户又曰蟄蟲鵲巢皆向天一蓋鵲巢開戸向天一而背太歲博物志云鵲背太歳也先儒以爲鵲巢居而知風蟻穴居而知雨蓋鵲歳多風則去喬木巢旁枝故能髙而不危也然而强且不滛知風之自而搆其巢知歳所在而開其戸者鵲也强而不滛所以成徳故有行知風之自而搆其巢知歳所在而開其户所以趨時故有功詩人以譬國君積行累功詩曰防有鵲巢卭有旨苕言不驚懼之故防有鵲巢言不殘賤之故卭有旨苕俗說鵲巢中必有梁見鵲上梁者必貴蓋今二鵲共銜一木置巢中謂之上梁說文作舄象形通於舄履古之人履欲行不欲如鵲故其字借為舄履之舄所以為行戒其在相法有之鵲行蹌蹌性行勿良是也亦言舄以木置履下乾昔如鵲崔豹古今注曰乾昔不畏泥濕故曰鵲也象文作鵲蓋從錯省淮南子曰如鵲之駮一何從昔昔言乾也考工記曰穉牛之角直而澤老牛之角珍而昔周官屨為赤舄黑舄赤繶黄繶青絇此言王及后服屨赤舄以赤為繶黑舄以黄為繶皆青絇也鄭氏以為王吉服有九舄有三等赤舄為上冕服之舄下有白舄黑舄王后吉服六維祭服有舄𤣥舄為上禕衣之舄也下有青舄赤舄今云赤繶黄繶雜互言之非是也蓋王及后舄之名一而已赤舄王六冕之舄黒舄后三翟之舄其他服則屨爾詩曰𤣥衮赤舄又曰赤舄几几其傳曰赤舄人君之盛屨也又曰赤芾金舄㑹同有繹其傳曰金舄逹屨也舄蓋臣道也所服之闕故屨人無之而謂之逹屨謂之金舄舄而金絇也然則古者諸侯方其為人君則赤舄方其為人臣則金舄氏子抄曰舄九寫而為烏虎三寫而為帝言書之轉易如此意林曰書三寫魚成魯帝成虎亦是意也鸛鸛形狀略似鶴其性甘帶毎遇大石知其下有蛇即於石前如術氏禹歩其石阞然而轉南方星人學其法者伺其養雛縁木以篾絙縳其巢鸛必作法解之乃於木下鋪沙印其足跡而放學之天將雨則長鳴而喜蓋知雨者也又善羣飛薄霄激雨雨為之散作巢大如車輪卵如三升闕擇石以嫗卵蓋鸛水鳥也伏卵時數入水卵則不毈取礜石周圍繞卵以助暖氣故方術家以鵲巢暖中礜石為真物也又泥一㫄為池以石宿水今人謂之鸛石取魚置池中稍以飼其雛俗謂鵲巢蔽形鸛石歸酒又曰礜石濕鸛石凉故能使卵不毈水不臭腐也詩曰鸛鳴于垤婦歎于室垤蟻室也蓋鸛知天將雨有見於上蟻知地將雨有見於下鸛鳴于垤將雨之候也將雨則征夫之至不必如期故婦歎于室也且行百里者半九十言末路之難也則於是遇雨為尤苦詩人道此叙其情而序曰三章言室家之望女也禽經曰鸛俯鳴則隂仰鳴則晴仰鳴是有見於上也俯鳴是有見於下也夫文雚見為觀亦取諸此鵝鴿鵛如癭鵝顙如瘤今鵝江東呼􅕯長頭善鳴又喜轉旋其項故古之學書者法以動腕羲之好鵝者以此亦取其自然而有行列故聘禮曰出如舒鴈而古者兵有鵝鸛之陣也左氏曰鄭翩願為鵞蓋舊說言江淮謂羣鸛旋飛為鸛井則鸛善旋飛盤薄霄漢與鵞之成列正異故陣法或願為鵞或願為鸛卞子曰羊性滛而狠猪性卑而率鵝性頑而傲狗性險而出蓋鵞峩首似傲故曰傲也名之曰鵝其謂是歟禽經曰鵝飛則蜮沈鸛鳴則蛇結又曰鵝伏隨日鳱伏隨月說者以謂乳鵝伏卵隨日鳱伏卵隨月光所轉又曰腳短者多伏腳長者多立腳近尾者好歩近臆者好躑多伏􅕯鵞之類是也雉雉死耿介妬壟護疆善鬭雖飛不越分域一界之内要以一雄為長餘者雖衆莫敢鴝鳴潘岳所謂畫墳衍以分畿者也周官曰士執雉蓋士死制故執雉所謂二生一死贄者也又其交有時别有倫而其羽文明可用為儀故古者后服三翟詩曰有瀰濟盈有鷕雉鳴濟盈不濡軌雉鳴求其牡言雉冝交有時别有倫而今反以雌求雄非特以雌求雄又求牡焉以雌求雄滛也以雌求牡焉亂也故曰公與夫人並為淫亂又曰雄雌于飛泄泄其羽言雉交有時别有倫而又性善鬭雖今不犯域分宣公滛亂不恤國事軍旅數起則雉之不如也易曰離為雉蓋離火其體文明其性復焱悍故為雉雉雖非辰属而正是南方之物陶氏所謂丙午日不可食者明王於火也禮云雉曰疏趾蓋鴈鴨醜趾間有幕其足蹼雞雉醜指閒無幕其足疏故曰疏趾也簡兮之詩曰左手執籥右手秉翟此大舞也宛丘之詩曰無冬無夏值其鷺羽此小舞也蓋雉取文明鷺則取其潔白之容而已所謂大舞者籥舞也所謂小舞者羽舞也故樂師云掌教國子小舞而一曰羽舞或曰雉性突前其字從矢或曰虎豹之文來田雉之文來射故從矢也易曰射雉一矢亡雉雞類也不能逺飛騰躍而上髙不踰丈横不過三丈故先儒云雉髙一丈長三丈也蓋古者數數以萬度度以雉書曰雉不再合信也說文曰雷始動雉鳴而鴝其頸蔡邕月令以謂雷在地中雉性精剛故獨知之應而鳴也鷂雉釋鳥云江淮之南青質五采皆備成章曰鷂雉王后之服一曰翬翟畫以翠雉二曰揄翟畫以揄雉三曰闕翟言刻繒為之闕而不畫闕而不畫則其制屈於三翟毛詩名物解卷七
