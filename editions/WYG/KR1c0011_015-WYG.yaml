body:
  text: 毛詩名物解卷十五宋蔡卞集解雜釋泉丘風憂賢人君子雜解泉泉水之上出也故以喻政令下泉是也氿泉不正出之泉而物所病也故言浸穫薪檻泉正出之泉而物所生也故言采其芹秩秩斯干德澤之流有叙也豐水東注順理者也滮池北流逆理者也泉源水所出而在左卑也淇水泉所歸而在右尊也此尊夫卑己者也淇有岸岸所以自防隰有泮泮所以自辨此悔而反正也丘丘者地之髙而中者也髙臣德也中臣道也黄鳥不得中阿之屈以容則庶得丘隅丘側之苟可以止此大臣遺忘微賤者楊園之道猗于畆丘楊生於卑濕㣲臣也畆丘大臣也以讒言之所摇常自卑以及髙邪之所歸常自下以及上也旄丘前髙後下以言衞有初而無後宛丘四方髙而中央下之丘也以言陳有外而無中也無後謂不能救亂也無中謂蕩而無守也阿丘偏髙山而陟以采蝱憂傷故也丘中不平之地而猶有麻麥李者言盡地以富之此思賢也風凡曰風則又以爲和又以爲暴自和而言之有凱風清風谷風自暴而言之有飄風終風匪風凱以言其樂之情清以言其微之意谷以言其和而容之道孝子慰母心者情也故樂長養之仁以盡其禮吉甫作頌者言也故歌仁言之微以動其意谷風習習和意也隂陽和則雨也然天之道不能常和而欲責人之常和盡人之歡竭人之忠此夫婦之所以道絶也故谷風有以言夫婦有以言朋友終風暴而不止者也故暴而且霾霾而且曀北風威雨雪虐也所謂並爲威虐也於以動之者風也揭兮飄兮匪風也泉流而有迹故下泉言思治也風動而無形故匪風言思道也飄風𤼵𤼵政令急也卷阿亦曰飄風者君如卷阿之究則賢如飄風之疾至矣憂憂瘁病也蓋氣不舒則憯血不榮則瘁瘁者憂之見乎色者也傳曰形容枯槁顔色憔悴蓋顔色黎黒而肌肉䵟黣則憔矣顔色柔瘠而膚革病瘦則悴矣凡此皆以憂故也夫憂之於人也聲𤼵於嘯歌液感於涕泗氣㪚於永歎形疲於假寐夏之長不能消之於晝冬之久不能消之於夜采蝱之丘而内有不能治植諼之背而外有不能忘其苦也有至於荼其毒也有至於藥以實則爲噎以虚則爲飢以爲物所攖則如結以爲物所中則如擣以昏則如醉又至於如酲以煩則如惔又至於如熏其懸也如旌之摇其屬也如棋之奕其烈也如湯其慘也如隂衆焉則隱又慇獨焉則惸又至目之爲昏花也而有莪蔚之眩耳之爲聼營也而有雷霆之疑以病其體膚也則心爲之使痗以衰其鬢髪也則身爲之用老則憂之害人見於詩多矣豈特顔色之瘁而已哉賢人君子凡言仁人言忠臣言德言賢言君子何也柏舟言愛其君之至故所憂不能恝然忘受侮不肯翻然去此仁人者也北門忠其君之至故窶貧摧讁之不憫從事已迫而不去以其不可如何而歸之天此忠臣者也人實迋女則忽之無忠臣者也人實不信則忽之無良士者也鹿鳴有羣臣有忠臣有嘉賔何也合而言之則所宴莫非臣也别而言之則示我周行者忠臣也是則是傚者嘉賔也善未至於德之充也德未至於賢之盡也兎罝椓之丁丁而施之於中逵中林言德之隆於始也此莫不好德者也赳赳武夫公侯干城而至於好仇腹心言賢之有大於初也此賢人衆多者也簡兮之多能而言有力如虎之武執轡如組之藝執籥秉翟而不改其赫如渥赭之容此所以爲賢也考槃之窮處寤言至於歌之樂寤言至於宿之安然後憂其君而不能自己也故永矢以絶之此所以爲賢也善人淑人以可欲言之也美人淑人以充實言之也恭人以禮言哲人以智言君子合仁智而言也君子以有德有位言也良人不爲惡而已吉人不爲凶而已宗公所受教者也黄耇所乞言者也老成人重於典刑者也文王之聖所獨也惠於宗公所同也宗公人謀也人謀從則鬼謀從故神㒺時怨神㒺時恫雜解上信足以待諸侯猶柞棫之固葉義足以制諸侯猶紼纚之維舟韎韐士服也服士服而作六師所謂命也鞞琫有珌諸侯之服也所謂爵也箴者箴其過戒者戒其不及宣王銳於始而怠於終故庭燎之初箴其過以見於小雅常武之後戒其不及以見於大雅欲則易求則難欲在意求在心欲而不求者有矣未有求而不欲者也孔子曰我欲仁斯仁至矣五美以爲政欲仁者也輕國以避地非求仁者不能也詩之辭於國之富毎言馬於物之微每言魚蓋馬賤者也魚微者也言賤以致貴言微以致著聖人天道之與物交者也神人天道之與物辨者也大人人道之與物交者也至人人道之與物辨者也親天屬也據以内恃者也賢人屬也依於内輔者也謀欲其圖大故曰厥家戒欲其慎小故曰厥士先王使有瞽在庭者以其聼之審因其能而食焉雖食不廢也崇牙有主物之意而南方禮樂之㑹羽南方之屬文王始造者也故其文德昭於始武王續終者也故其武功昭於終文王倡於上武王應於下文王傳於上武王受於下繹之而後明思之而後得酌先祖之道允師之謂矣以飬天下爾公之謂也雜解中失性以天言失所以地言由之者失其道居之者失其理喜者禮之樂樂者樂之樂藻之爲物潔蒲之爲物柔據於藻依於蒲雕如木之雕琢如鳥之啄以天命言之不可易也故太伯能譲以天性言之不可忘也故王季能友雜解下鹿鳴之燕樂主君臣言之也皇華之忠信臣道也燕樂以言其所交忠信以言其任四牡居二者之間所以備君臣之道師父道也保母道也𫝊夫道也父以教之母以生之夫以扶之裁猶裁者之裁衣範猶範者之範器圍猶圍者之圍所君子義以爲質仁以爲心禮以爲體信以爲身身之者信也假之者僞也惠公之驕僖公之願所謂無禮以體之也毛詩名物解卷十五
