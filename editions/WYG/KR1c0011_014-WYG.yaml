body:
  text: 毛詩名物解卷十四宋集解釋馬駰驪駽駓驔驒騏驄魚騢馰騮驈駱騅驤馵自駰至馵駰隂白也馬火畜也隂白䝉之有因之義因猶姻也驪黑也馬火畜也麗乎黒也駽青驪也馬火畜也以青為所生以黒爲所麗既得所生又得所麗有㫖之意駓黄白雜色也静而中者黄之道動而變者王之事雜故變變故大王者大也皇所出也不一而大爲丕駓有雜意驔豪骭也豪覃乎闕驒青驪驎也驒文若鼉騏若綦騘若葱騢若霞馰若的騮赤鳥黒鬛也赤黒闕也以赤闕黑爲得其匹留而不行驈黑馬白胯也白黒母也以白下黒爲從其子述而不作胯志在隨者也駱白馬黒鬛也爲子勝母雒黒馬白鬛也爲母勝子乖異之道故皆從各母從子者也勝爲上逆故又從隹馵後足白也右震也震爲作足又爲馵足其爲作足陽也其爲馵足隂也隂不動故爲後左白者隂也二者陽也當震之時隂不違陽也故二焉與白同意毛詩名物解卷十四
  hash: sha256:1243dea169a47b0f0a2a141851ea4a1b4802bd1d65afff265dc617add02ebf3b
