body:
  text: 毛詩名物解卷十二宋蔡卞集解釋蟲螢蟋蟀蛣蜣阜螽蟦蠐蛾蠁蝶莎雞蜩螟蛉蜴蝤蠐熠燿蜉蝣螢夜飛腹下有火故字從熒省螢小火也月令季夏曰腐草爲螢不言化者不復爲腐草也傳曰螢帶火而宵行是故秋隂數雨螢火夜飛之時一名挾火一名據火一名熠燿詩曰熠燿宵行今西北多螢火大者如棗其小者尚如蠶蠋行輒有光正曰宵行以此故也詩傳曰熠燿燐也燐螢火也先儒以爲老槐生火血久爲燐燐非螢火誤矣蓋燐者微火之名故此兩者通謂之燐廣雅曰景天螢火燐也而古今注亦以爲螢食蚊蚋一名夜光一名宵燭一名燐然則燐亦螢火明矣崇有論曰鳥無胃而生螢無胃而育蟋蟀蟋蟀似蝗而小善跳正黑光澤如漆一名蛬一名促織語曰促織鳴懶婦驚有悉率之義故曰蟋蟀之道也曹奢而迫唐儉而勤故詩一以蜉蝣一以蟋蟀刺之詩曰蟋蟀在堂嵗聿云莫在堂九月之時也九月建戍於文禾千爲年歩戌爲嵗一章曰職思其居言於行思其居也二章曰職思其外言於内思其外也三章曰職思其憂言於樂思其憂也序所謂憂深思逺有堯之遺風此也詩曰十月蟋蟀入我床下言蟋蟀微物也猶知随時可以人而不如乎故曰物有微而志信人有賤而言忠也傳曰蟋蟀之蟲隨隂迎陽一名吟蛩秋初生得寒乃鳴蛣蜣蛣蜣一名蜣蜋爾雅所謂蛣蜣蜣蜋是也黑甲翅在甲下五六月之間經營穢場之下車走糞丸一前挽之一後推之若僕人轉車久之輒羽化而尸解仙去也莊子蛣蜣之智在於轉丸夫以蜘蛛蛣蜣之智也猶知能布網轉丸則萬物付之自然各有觧矣此莊列之徒所以欲攦工倕之指也淮南子曰周鼎著倕使銜其指以明大巧之不可爲正謂是歟故抱朴言𤣥蟬潔飢不如蜣蜋穢飽故囬之簞瓢有以輕猗頓之冨阜螽爾雅曰阜螽蠜亦名負蠜蓋草蟲鳴阜螽躍而從之故阜螽負草蟲謂之負蠜也詩曰喓喓草蟲趯趯阜螽言大夫妻求而進疾於聽從如此枤杜亦云者蓋言赫赫南仲薄伐西戎故從役之大夫婚姻得以及時如召南之世也豈特大夫而已蓋其下者歸亦以時得及婚姻祭祀蠶耕之事故曰春日遲遲至獫狁于夷蟦蠐爾雅曰蟦蠐螬蝤蠐蝎蓋蟦蠐一名蝎本草亦曰一名蟦蠐舊說蝤蠐生於木中内外潔白蟦蠐生糞草中外黄内黑亦或謂之蠐螬是也大者如足大指以背行乃駛於足造化權輿曰蛇豸腹竄蠐螬背行蛾慱物志曰食桑者有蛹而蛾蛾類皆先孕而後交蓋蛹者蠶之所化蛾者蛹之所化荀子曰蛹以爲母蛾以爲父是也蛹一名螝蛾一名羅孫炎爾雅正義謂螝是雄蛹是雌羅雄蛾雌似黄蝶而小其睂勾曲如畵詩以譬莊姜今一種善拂燈火夜飛蛾一名慕光亦其類也蠁爾雅曰國貉蟲蠁郭璞云今呼蛹蟲爲蠁廣雅曰土蛹蠁蟲也舊說蠶爲蟬身乳子己繭化而成蛆俗呼蠁子入土爲蟬爾雅曰強醜捋即此是也羣飛草上好以手摩捋其鬚其物稍強因名之蠁蓋蟲之知聲者也蝶蝶粉翅有須一名蝴蝶列子曰蝴蝶胥也烏足之根爲蠐螬其葉爲蝴蝶嘗見園蔬其葉爲蝴蝶者有三分二已蝶矣其一尚葉也干寳曰稲成蛬麥成蛺蝶豈虚語哉莎雞小蟲黑身赤首一名樗雞一名天雞爾雅曰螒天雞蓋其鳴以時故有雞之號詩曰六月莎雞振羽言於是時莎雞羽成而振迅之也草木疏曰如蝗而斑色毛翅數重其翅正赤六月中飛而振羽索索作聲幽州人謂之蒲錯古今注曰莎雞一名絡緯謂其聲如絡緯也俗云絡緯雄鳴於上風雌鳴於下風而風化蜩蜩蟬五月鳴蜺也譁以無理則用口而已然其聲調而如緝故謂之蜩五月鳴謂之蜩以其聲也七月鳴謂之蟬以其生之寡特形之單微也蟪蛄所化謂之蜩螗蜩有文故或謂之蜻螗無文或謂之夷詩曰如蜩如螗蜩大而螗小蜩言其譁而無理螗言其夷而無文螟蛉螟蛉者蟲之感氣而化者也然所化必以類故惟桑蟃爲能取之以爲已子君子之於民亦類也苟有道以得之孰不爲化哉詩曰螟蛉有子蜾蠃負之則能以氣化其類者也故譬則君㝠者無知令者有以從無知則有從所以能化於物也故譬則民桑蟃之爲物其氣腴白螟蛉有以氣化故其氣清蜴蜴蠑螗也其類似多而所生異蓋在陸者蟲屬在水者魚屬蠑螗在汙澤者也或謂之蛇醫守宫祝蜓在野者也蠦蟾蝘蜓在室者也然蜴非常候蛉蚧者也二者大而能鳴蜴非能鳴也正月云哀今之人胡爲虺蜴言徒隂伏蕩不平之氣而不能有聲蝤蠐蝤蠐桑蟲也桑質柔腴白蝤蠐食桑之腴故色白而體柔熠燿熠燿謂之燐幽隂之血化而爲燐者也言吝而不能廣照也荄本之腐草化而爲螢螢者火華之細者也非燐也萬物以情動故物變於外而情動於内東山之民所以見燐而有懐也其幽隂之血所化故疑於可畏然而有懐役之思而忘其所畏故曰亦可畏也伊可懐也蜉蝣蜉蝣輕也朝生而暮死故謂之渠略生於夏月隂陽氣之卑濕而浮游者故其爲物不實而小曹君無篤實之德而從其小體若此刺其甚矣毛詩名物解卷十二
