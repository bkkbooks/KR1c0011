  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1c0011_WYG_019-1a, image: WYG0070/WYG0070-0602c.png}
body:
  text: 毛詩名物觧卷十九宋蔡卞集觧雜觧衣服觧木瓜觧衣服觧日月天明星辰天精也此道之成象在上者其施於人也則仁而已仁則静獨立而不改者山也仁而動周行而不殆者龍也仁之於道其常體如山其變用如龍其接物也則禮而已交有時别有倫其文𤼵於自然者華蟲也日月星辰四物也二十八舍者星也星以經之辰以緯之星合而爲一章山龍二物也合以象天仁華蟲一物也離以象天禮凡此皆天德也故作繪而在上虎義獸蜼智獸也其體畫於宗彞此道之成器而在下者其清足以潔已而可以薦羞者藻其明足以燭物而可以烹治者火以義潔已而其清欲如藻以智燭物而其明欲如火故言宗彞次言藻火米養人者也養人不可以無物故次之以黼黼者制物制物不可以無辨故次之以黻凡此皆人德也故絺繡而在下天道則象也其出與萬物相見故衣繪始於象而終於華蟲華蟲南方之物也人道則器也其入則與萬物相辨故繡始於器終於黻黻者北方之物也以方言之於文兩人相背爲北以物言之於象兩已相背爲黻蓋方以類聚者仁也其相背也亦以仁故北象兩人相背之形物以羣分者義也其背也亦以義故黻象兩已相背之形舜典於裳言絺則知名衣之在冬而其上則有裘矣周官以衣言裘則知名裳之在夏而其下則有絺矣裘者其質自天故於衣見之絺者其文自人故於裳見之文者夏也質者冬也此冕服十二章舜欲觀焉者也王者相變至周而以日月星畵於旌旗所謂三辰旂旗昭其明也冕服九章登龍於山登火於宗彞尊其神明也蓋不體乎天道不可以爲帝不躬乎天德不可以爲王故舜十二章自日月始而周之九章則自交龍始龍神物也變以象天德火明物也化而象人德登龍於山所以尊神以象其聖治聖治者道化也登火於宗彞所以尊明以象其孝治孝治者德教也以天道帝者則於人欲俯而親之以爲教故舜之宗彞繡於裳以天德王者則於天道欲仰而觀之以爲化故周之日月星辰畵於旌旗衮冕言其義鷩冕言其名毳冕言其物絺冕言其數𤣥冕言其色冕俛也其服在首欲其俯首以接物而志彌下也衮卷也其服在身欲其屈身以接物而體彌恭也青質五色皆備而成文章者翬也素質五色皆備而成文者褕也青質仁素質義而五色以文者禮也故曰后六服一曰翬翟二曰褕翟鷩則質不足乎翬文不足乎褕下王后一等故侯伯之下自鷩冕而下也王后配王者也侯伯事王者也故古之人遠取諸物而其制服也如此舜典言華蟲而於此言鷩冕舜典言宗彞而於此言毳冕舜典言粉米而於此言絺冕統而言之鷩冕毳冕絺冕别而言之華蟲者之物矣又言鷩冕以名之宗彞者之物矣又言毳冕以名之粉米者之物矣又言絺冕以數之也蓋古之人立法非特見於一書之間雖異人殊世而固有前後相成彼此相從若符合節若此之類也舜有十二章而至周爲九者則天道之數者帝也法天道之數者王也蓋六隂六陽其類有十二章焉而易曰立天之道曰隂與陽此偶數之在道者也九則陽道而已而易曰用九天德不可爲首也此竒數之在德者也王者下體天德上法天道故其所服者九章而已至於旒之施於冕斿之施於旗則其數皆十二焉蓋觀而法之者天道之數也裘冕内服大裘所以象天道外被華衮所以象天德質足以象天道文足以象天德此天之所以享也故祀昊天上帝則服大裘而冕蓋先王以方外往超分域之外而神明者也先公以域中來守分域之内而文眀者也故祀先王則衮冕祀先公則鷩冕饗所以交之也射所以别之也故饗射衣以鷩冕者交有時别有倫者也虎有義德蜼有智信而君子以爲仁也柔義也剛仁者静義者動也山以形結之而成剛故以虎義象其剛水以柔融之而成動故以蜼智象其動義足以象其剛智足以象其動此四望山川之所以享也故祀四望山川則毳冕絺冕象其利之周廣也故祀社稷五祀則絺冕𤣥冕象其功之微昧也故羣小祭則𤣥冕韋弁之色赤冠弁之色黑赤者南方之色黑者北方之色也先王於武事方其以仁致天討則象德而主生方其以義教民戰則尚威而主殺故兵事韋弁服田事冠弁服至於祀朝則又以西方之白焉白正秋色春動也而其氣和秋静也而其氣肅蓋先王之於朝事以静應庶事以肅欽庶功朝事皮弁服自𤣥冕而下先王所以事神之服也故其衣繪以象其裳繡以器自韋弁而下先王所以治人之服也故衣裳示之以色視而已象陽也色隂也事神主禮故其服曰冕欲其自下也治人主義故其服曰弁欲其自取也先儒云冕俛也弁樊也先王之制芾也所以蔽膝自𤣥冕而上皆謂韍自皮弁而下皆謂韠惟士服之爵弁兵服之冠弁則又謂之韐左傳曰𤣥衮韍珽而鄭氏亦云冕服謂之韍此自𤣥冕而上謂之韍之驗也儀禮於皮弁言素韠於𤣥冠言緇韠於𤣥端言爵韠此自皮弁而下謂之韠之驗也禮云爵弁纁裳純衣韎韐此士服之爵弁謂之韐之驗也詩曰韎韐有奭以作六師此兵服之冠弁謂之韐之驗也古者大朝覲㑹同其首皆冕其服皆芾其足皆舄而車攻於㑹同云赤芾金舄采菽言朝覲則云赤芾在股則朝服亦謂之韍不特施於祭祀也又素冠祥祭之冠也素韠釋祭之韠檜風刺不能三年而始於素冠終於素韠而祭服亦謂之韠不特施於朝服也先儒云祭祀謂之韍朝覲謂之韠非是也韍從犮蓋言其容説文云以大夫貎言其行則刺犮也詩日赤芾在股邪幅在下明君子之足容能白刺故芾之刺足如此韐言合蓋言其體也鄭氏云韎韐合韋爲之故合制字如此芾從一蓋先王制服始於芾上古未有衣服止有一芾蔽前故芾之制字如此韠從畢蓋言君子之制服訖於韠凡服始於冕畢於韠赤南方之色下朱一等木瓜觧齊桓以諸侯而擅封諸侯非禮也衞國思其恩而美之則可矣以此爲齊桓之美則有所不可故木瓜不列於齊而繫於衛也孔子曰吾於木瓜見苞苴之禮行苞苴之禮小者也然周之末世強凌弱下暴上衆欺寡而其禮亦從而亡故小國竭帑藏以奉大國而大國不以爲禮大國少有以及小國則小國罄其所有以爲報齊桓以信義及於諸侯而諸侯率懐其德而不專畏其力故問遺得以稱其重輕以爲禮此孔子所以歎其能行苞苴之禮也瓊琚玉也瓊瑶石之似玉者也瓊玖石之次於瓊瑶者也有女同車言佩玉瓊琚則琚之爲玉明矣篤公劉言維玉及瑶周官大宰贊王用玉爵内宰贊后用瑶爵則瑶非玉也石之似玉者也丘中有麻言貽我佩玖而不言玉又庶人得寶而有之則其次於瑶也又可知矣木瓜美而且大者也木桃次之木李又次之衛雖以齊有功於已而厚報之然彼遺我之物有殺則我亦得稱其投之物而厚爲之報自非不畏其力而懐其德則安敢輕重自恣哉於此蓋有以見齊桓之美而又以見衛文亦不敢以姑息肆愛於大國也然所報之物旣有殺矣而衛人欲厚報者蓋彼投我以木瓜果耳我報之以瓊玉是以雖有殺而不失其爲厚報也毛詩名物觧卷十九
