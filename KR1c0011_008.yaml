body:
  text: 毛詩名物解卷八宋蔡卞集解釋鳥烏鸇鵰鴈鷹鵁鶄鶴鸕鷀鳧鷮烏說文云烏孝鳥也象形林罕以謂全象鳥形但不注其目睛萬類目睛皆黒烏體全黑逺而不分别其睛也烏一名鴉其名自呼淮南子雅之啞啞鵲之唶唶豈為寒暑燥濕變其聲哉詩曰莫赤匪狐莫黑匪烏蓋狐羣者也烏合者也詩以況衛之君臣並為虐威其惡如一又曰哀我人斯于何從禄瞻烏爰止于誰之屋言富人之屋利之所在故烏集焉民之從禄將如是矣故大夫欲王瞻之也抑曰匪手攜之言示之事此之謂也又曰具曰予聖誰知烏之雌雄言幽王君臣俱自謂聖如烏之黑而雌雄無以相别也管子曰烏集之交初雖相讙後必相咄詩人毎以為刺者非特譏其為惡如一亦刺其初皆利合不以道也烏又為歎辭者蓋雅見虎則鳴見異則噪故以為烏烏虖歎所異也今人聞鵲噪則喜聞烏則唾以烏見異則噪故輒唾其凶尚書大傳曰愛其人者兼其屋上之烏然則惡而知其善愛而知其惡者寡矣孫子曰烏起者伏也烏集者虚也言古善料者觀烏起而知伏視烏集而知遁傳曰烏樂空曠鵲樂稠閙世云鴛交頸而感烏傳涎而孕莊子曰烏鵲孺蓋謂是歟又曰見烏飛翅重知天將雨蓋烏陽物也感隂氣而翅重故俗以此占其雨下淮南子曰騰蛇游霧而殆於蝍蛆烏力勝日而服於鵻禮陽物也鸇釋鳥曰晨風鸇草木疏云似鷂黄色燕頷勾喙向風摇翅乃因風飛急疾擊鳩鴿燕雀食之列子曰鷂之為鸇鸇之為布榖久復為鷂也孟子所謂為叢敺雀者鸇即此是也詩曰鴪彼晨風鬱彼北林言穆公能芘其所頼而賢者赴之如此曽子曰國有道則突若入焉此之謂也且黄鳥仁晨風義而秦之良士以仁死賢臣以義生故黄鳥曰哀三良而晨風以刺棄其賢臣禽經曰好風惡雨然則謂之晨風可知矣又曰鵰之智不如鸇鸇之智不如鴈今鸇亦去來有時然其制字從鸇又可知矣鵰鵰狀似鷹而大黑色俗呼皂鵰一名鷻其飛上薄雲漢詩曰匪鶉匪鳶翰飛戾天匪鱣匪鮪潛逃于淵言民人飛揚竄伏如此所謂亂也決起而飛曰翰料起者詩曰如飛如翰蓋飛象料飛之形而翰從翰飛翰言以翼自翰而上也今鴻鵠鵰鳶之類皆言翰爾雅曰象謂之鵠玉謂之鵰蓋鵠之義出於鴻鵠之鵠鵰之義出於鵰鶚之鵰鵠性勁利鵰性刻制故也今大鵰翺翔水上扇魚令出沸波攫而食之一名沸河淮南子曰鳥有沸波者即此是也禽經曰淘河在岸則魚没沸河在岸則魚出鴈釋鳥曰鳧鴈醜其足蹼其踵企郭璞以為鳧鴈指閒有幕蹼屬相着故曰其足蹼是也又曰飛則其踵企直非是也踵足後也蓋今鳧鴈之醜行則皆前幕布地而後踵常企故曰踵企也以今鵞觀鴈行鴨觀鳧行則概可見矣鴈行斜歩側身故詩曰鴻飛遵渚公歸無所於女信處鴻飛遵陸公歸不復於女信宿蓋鴻之為物其進有漸其飛有叙其羽可用為儀君子之道也故以此喻周公易曰漸之進也公歸東都則為進矣然未至西都也故為不復易曰其羽可用為儀言不可亂也然則禮有以鴻為儀者取其行列不亂而已禮曰前有師旅則載飛鴻鴻飛則有行列故也載謂合剥皮毛舉之竿首若禮所謂以鴻脰韜杠也周官以禽作六摯大夫執鴈以其保身又欲有去就之義者而不失其序故執鴈也蓋鴈夜泊洲渚令鴈奴圍而警察飛則銜蘆而翔以避矰繳有逺害之道非特取其去就之義而已鹽鐡論曰噰噰鳴鴈朝日始旦登得前利無蹈後害此言婚姻以禮則有利而無後害也夏小正曰鴈北郷郷者何也郷其所居也何以謂之居也生且長焉耳又曰逓鴻鴈先言逓而後言鴻鴈何也見逓而後數之則鴻鴈也且曰逓則猶言乘傳云耳非其居也法言曰能來能徃者朱鳥之謂蓋燕一名𤣥鳥鴈亦名朱鳥𤣥鳥以春分來朱鳥以春分去淮南子曰燕鴈代飛此之謂也且鴈霜降南徂冰泮北徂其性惡熱故中國始寒而北至舊說鴻鴈南翔不過衡山今衡山之旁有峯曰回鴈蓋南方地極燠人罕識雪者故鴈望衡山而止陳琳曰陸䧟蘂犀水截輕鴻輕鴻毛也傳曰輕於鴻毛今人試刀以髪浮轉於水而令刃斷之水截輕鴻殆類是也博物志曰鴻毛為囊可以渡江不漏制字從江其以此乎或曰大曰鴻小曰鴈鴻蓋從鴻大鳥也鷹鷹鷙鳥也一名鷞鳩左傳曰鷞鳩氏司冦蓋鷹鷙故為司冦一曰一歲為黄鷹二歲為鷂鷹三歲為鶬鷹鷂次赤也埤倉音披免切鷹鷂二年之色也蓋頂有毛角微起今通謂之角鷹詩曰維師尚父時維鷹揚言其武之鷹揚如此樂記所謂發揚蹈厲太公之志也舊說凡鷙鳥雛生而有慧出殻之後即於巢外放條大鷹恐其墜及為日所曝熱暍致損乃取帶葉枝揷其巢畔防其外墮及作隂凉也欲驗雛之大小以所插枝葉為候若一日二日其葉微萎尚帶青色至六日七日其葉草微黄十日後枯瘁此時雛大可取說文曰癰從瘖省蓋癰從疾省佳之疾㨗者故從疾省也隨人所指蹤故從人禽經曰鷹不擊伏鵠不擊妊蓋其義性如此裴氏新書曰虎豹無事行歩之時若將不勝其驅鷹處衆鳥之閒若睡寐然積怒而全剛生焉越之報吳用此道也鵁鶄鵁鶄一名鳽似鳧腳髙毛冠巢於髙木生子穴中子銜其母翅飛上下淮賦所謂鸕鷀吐雛於八九鵁鶄銜翼而低昂者也段氏云鵝警鬼鵁鶄厭火孔雀避惡舊說此鳥長目而睛交故有鵁鶄之號相如所謂鵁鶄旋目者是也禽經曰旋目其名鶚交目其名鳽方目其名鴀矣鶴鶴形狀似鵝青腳素翼常夜半鳴故淮南子曰雞鳴將旦鶴警夜半其鳴髙亮聞八九里雌者聲差下舊云此鳥性警至八月白露降流於草木涓滴有聲因即髙鳴相警移徙所宿處慮有變害也蓋鶴體潔白舉則髙至鳴則逺聞性又善警行必依洲嶼止必集林木詩易故以為君子言行之象始生二年落子毛三年産伏七年飛薄雲漢後七年學舞後七年應節後七年晝夜十二鳴中律後六十年不食生物大毛落茸毛生色雪白泥水不能汚百六十年雌雄相視目睛不轉而孕千六百年飲而不食聖人在上則與鳯凰游於甸其精神氣骨應相禽經曰鶴以怨望鴟以貪顧雞以嗔視鴨以怒瞋雀以猜瞿燕以狂䀪視也鶯以喜轉烏以悲啼鳶以飢鳴鶴以潔唳䲷以凶呌鷂以吉嘯鳴也今鶴雌雄相隨履其跡而孕傳曰鶴影生鼈男化也鸕鷀鸕鷀食魚似鶂而黒一名鷧觜曲如鈎其骨主鯁及噎蓋類而推者也此鳥吐而生子神農書所謂鸕鷀不卵生而吐其雛獨為一異是也楊子孚異物志云鸕鷀没於深水取魚而食之不生卵而孕雛於池澤既胎又吐多者七八少者五六相連而出若絲緒然水鳥巢於髙木之上鳧鳧有不可畜者能及人也為得已焉有可畜者能及人而止為居石焉鷮尾長而走且鳴則其首尾鷮如也毛詩名物解卷八
