body:
  text: 毛詩名物解卷三宋蔡卞集解釋百榖黍稷稻粱禾麻菽麥牟稗稙穉穜秬秠穈芑苴黍黍丹榖也仲夏乃登故謂之黍而聲與暑同氣浮而味甘馨香而滑齊故宜釀神陽物也非有馨香上逹之氣不足以降之黍陽物也故用為酒釀凡言黍稷者皆有冀祖考懷祭祀念父母之意稷稷祭也所以祭故謂之穄杜預言黍稷曰粢降食以為酒貴食次之故穄者粱也所以祭明尊矣故五榖之官而稷官名之稻稻稌也豐年曰豐年多黍多稌蓋黍所以交神稌所以養人先王之盛時和而歳豐交鬼神養人之物備矣粱天以始至甘香者也粱從米所以濟人者也從刃所以利人者也豐年言養人之物而不言粱者蓋稌加膳於粱則為嘗膳禾禾粟之苖榦粟禾之穟實春秋者隂陽之中粟春生而秋熟方其以養生言之則謂之禾禾麻菽麥禾役穟穟是也方其以所用言之則謂之粟率場啄粟握粟出卜是也麻麻八榖之良者也實謂苴從且榖之貴者人可以爲食而不可以爲常也七月言九月菽苴采荼薪樗此先王所以致食而勞農之意也五榖之養人以浮虚爲下以沉實爲上胡麻之食沉實者也故良以敬人稷者交神之至實者也凡榖之至貴者又宜加碓以治之麻從林稷從畟皆勤治之意也麻爲麻枲之麻者以其求治析治於覆屋之下故同字菽菽謂之荏菽祀天地蓋菽有收斂之意而亦人所先也稻粱加膳也粟菽常膳也君子制而不爲異亦蹈其常而已故菽亦謂喻君子之徳中原有菽庶民采之言徳足以養人者天下之所歸􅉨也采菽采菽筐之莒之言取有徳受之以法度也麥麥之同乎陽者也至子而苖至午而成陽多則浮隂多則沉隂陽不相勝然後能善養人者也故麥可以爲美而不可爲加膳也牟牟可以爲助膳而非膳也牟麥之大者也先禾而生後禾而熟以其大故爲五榖之長麥之異種思文言貽我來牟后稷種藝以粒民者多矣來牟民先得以爲利者也稗稙穉穜秬秠穈芑稗可以食而非凶荒則不食冝小人而使之困也先種謂之稙後種謂之穉先熟謂之稑後熟謂之穜黑黍謂之秬二米謂之秠赤粱謂之穈白粱謂之芑稙直逹也故爲先種穉有待也故爲後種稑以言其和於土而苖遂之於蚤也故爲先熟穜以言其晚成而多實也故爲後熟秬齊正而有才者也故麻之實八角而純黑者謂之秬律度量衡以秬準之者以其方正滑齊而可用也秠不一也故爲一稃而二米穈者良之又良者也受成於火故其色赤芑者榖之至善者也受成於金故其色白萬物豐於火成於金穈有豐實之性也芑有成實之性蓋稙穉以言其榖之備穜稑以言其榖之美秬秠穈芑以言其榖之嘉也七月陳先公風化之所由得土之盛故曰穜稑稙穉之種因天時也穜稑之實得地氣也閟宫備言后稷稼穡之道故校四者而言之爲稼穡而因天時得地氣此所以降之百福也美榖可以養人嘉榖不可以爲食之常也先王用之於祭祀而已故生民言后稷之肈祀而曰誕降嘉榖秬秠穈芑苴苴所謂婦雀以苴之者已則棄焉所謂苴履者安可長也所謂棲苴者道者而已非所以爲存所謂土苴者此也所謂菽苴者其爲榖苴而已故六榖弗數焉毛詩名物解卷三
